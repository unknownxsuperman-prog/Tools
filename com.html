<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XOS | Priority Predictor</title>
    <style>
        :root { --bg: #000000; --accent: #007aff; --card: #0a0a0a; --border: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; margin: 40px; }
        .xos-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; margin-bottom: 16px; backdrop-filter: blur(20px); transition: 0.3s; }
        input, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin: 8px 0; }
        button { background: var(--accent); border: none; padding: 12px; border-radius: 8px; color: white; cursor: pointer; width: 100%; font-weight: bold; }
        .badge { font-size: 10px; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="xos-card">
        <div class="badge">XOS_PARSER_ACTIVE</div>
        <input type="file" id="pdfFile" accept="application/pdf">
        <input type="number" id="userRank" placeholder="Enter Rank (e.g. 17000)">
        <button onclick="analyze()">RUN PREDICTION ENGINE</button>
    </div>

    <div id="output"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Paste your data here
        const XOS_CUTOFF = [ /* Your full object from previous prompt */ ];
        
        async function analyze() {
            const file = document.getElementById('pdfFile').files[0];
            const rank = parseInt(document.getElementById('userRank').value);
            const reader = new FileReader();

            reader.onload = async (e) => {
                const pdf = await pdfjsLib.getDocument({data: e.target.result}).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    text += content.items.map(item => item.str).join(" ");
                }
                
                // Extraction Logic: Match College codes (e.g. E005, E048)
                const matches = text.match(/([E][0-9]{3})([A-Z]{2,4})/g);
                displayResults(matches, rank);
            };
            reader.readAsArrayBuffer(file);
        }

        function displayResults(extractedCodes, rank) {
            const output = document.getElementById('output');
            output.innerHTML = extractedCodes ? extractedCodes.map(code => {
                const college = XOS_CUTOFF.find(c => code.startsWith(c.id));
                return college ? `<div class="xos-card">MATCH: ${college.name}</div>` : '';
            }).join('') : 'No matches found.';
        }
    </script>
</body>
</html>
