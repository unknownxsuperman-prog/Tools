<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x0s Data Converter - Batch Engine v6</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --xos-bg: #000000;
      --xos-accent: #007aff;
      --xos-card: rgba(10, 10, 10, 0.7);
      --xos-border: #1a1a1a;
      --xos-text: #e0e0e0;
      --xos-text-muted: #888888;
      --xos-error: #ff3b30;
      --xos-success: #34c759;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--xos-bg);
      color: var(--xos-text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    .header-container { display: flex; align-items: center; gap: 1rem; }

    .dev-badge {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--xos-accent);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .utility-card {
      background: var(--xos-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--xos-border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: transform 0.2s ease;
    }

    textarea {
      width: 100%;
      height: 250px;
      background: transparent;
      border: 1px solid var(--xos-border);
      border-radius: 8px;
      color: var(--xos-text);
      font-family: 'Space Grotesk', monospace;
      font-size: 13px;
      line-height: 1.4;
      padding: 1rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s ease;
      white-space: pre;
    }

    textarea:focus { border-color: var(--xos-accent); }

    button {
      background: var(--xos-accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-start;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.95); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    
    .terminal {
      background: #050505;
      border: 1px solid var(--xos-border);
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 12px;
      height: 150px;
      overflow-y: auto;
      color: var(--xos-text-muted);
    }
    
    .log-err { color: var(--xos-error); }
    .log-ok { color: var(--xos-success); }
    .log-sys { color: var(--xos-accent); }

    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="header-container slide-up">
    <div class="dev-badge">xos1_batch_v6_univ</div>
    <h2>Data Converter Engine</h2>
  </div>

  <div class="grid">
    <div class="utility-card slide-up" style="animation-delay: 0.1s;">
      <h3>Raw Input</h3>
      <textarea id="rawInput" placeholder="Paste 300+ colleges raw data here..."></textarea>
      <button onclick="processData()">Execute Batch</button>
    </div>

    <div class="utility-card slide-up" style="animation-delay: 0.2s;">
      <h3>Compiled Output</h3>
      <textarea id="jsonOutput" readonly placeholder="Output will appear here..."></textarea>
      <button onclick="copyOutput()" style="background: var(--xos-border);">Copy Code</button>
    </div>
  </div>

  <div class="utility-card slide-up" style="animation-delay: 0.3s; padding: 1rem;">
    <h3>Diagnostic Terminal</h3>
    <div id="terminalLog" class="terminal">> System ready. Waiting for input...</div>
  </div>

  <script>
    const CATEGORIES = [
      '1H', '1KH', '1RH', '2AH', '2AKH', '2ARH', '2BH', '2BKH', '2BRH', 
      '3AH', '3AKH', '3ARH', '3BH', '3BKH', '3BRH', 'GMH', 'GMKH', 'GMRH', 
      'SCH', 'SCKH', 'SCRH', 'STH', 'STKH', 'STRH'
    ];

    function log(msg, type = 'sys') {
      const term = document.getElementById('terminalLog');
      const colorClass = type === 'err' ? 'log-err' : (type === 'ok' ? 'log-ok' : 'log-sys');
      term.innerHTML += `<br><span class="${colorClass}">> ${msg}</span>`;
      term.scrollTop = term.scrollHeight;
    }

    function processData() {
      const terminal = document.getElementById('terminalLog');
      terminal.innerHTML = '> Processing batch...';
      
      const rawText = document.getElementById('rawInput').value;
      if (!rawText.trim()) {
        log('Error: Input is empty.', 'err');
        return;
      }

      const normalizedText = rawText.replace(/\r\n|\r|\n/g, ' ');
      
      // v6 FIX: Removed strict asterisk requirement. Splits on "College:" regardless of preceding characters.
      const chunks = normalizedText.split(/(?:\*?\s*College:\s*)/i).filter(c => c.trim().length > 0);
      
      const colleges = [];
      let successCount = 0;
      let failCount = 0;

      log(`Found ${chunks.length} potential college blocks. Beginning parse...`, 'sys');

      chunks.forEach((chunk, index) => {
        let currentId = `Unknown_Index_${index}`;
        
        try {
          // v6 FIX: Use "Course Name" as the anchor instead of asterisks
          const courseNameIndex = chunk.search(/Course Name/i);
          if (courseNameIndex === -1) {
             throw new Error("Could not find 'Course Name' marker to separate header from data.");
          }

          // Extract Header, strip out any lingering asterisks just to be safe
          const headerStr = chunk.substring(0, courseNameIndex).replace(/\*/g, '').trim();
          const idMatch = headerStr.match(/^([A-Z0-9]+)\s+/);
          
          currentId = idMatch ? idMatch[1] : `UNK_${index}`;
          let fullDesc = idMatch ? headerStr.substring(idMatch[0].length).trim() : headerStr;

          let name = fullDesc;
          let location = '';
          const lastComma = fullDesc.lastIndexOf(',');
          if (lastComma > -1) {
            name = fullDesc.substring(0, lastComma).trim();
            location = fullDesc.substring(lastComma + 1).trim();
          }

          const bodyStr = chunk.substring(courseNameIndex);
          
          let cleanBody = bodyStr.replace(/Course Name[\s\S]*?STRH/ig, ' '); 
          cleanBody = cleanBody.replace(/Generated on:[\s\S]*?Page \d+ of \d+/ig, ' '); // Strip the specific footer you found
          cleanBody = cleanBody.replace(/Page \d+ of \d+/ig, ' '); 
          
          const tokens = cleanBody.split(/\s+/).filter(t => t.length > 0);
          
          const branches = {};
          let currentBranchTokens = [];

          for (let i = 0; i < tokens.length; i++) {
            let isDataBlock = true;
            
            if (i + 24 <= tokens.length) {
              for (let j = 0; j < 24; j++) {
                if (!/^([\d\.]+|--)$/.test(tokens[i+j])) {
                  isDataBlock = false;
                  break;
                }
              }
            } else {
              isDataBlock = false;
            }

            if (isDataBlock && currentBranchTokens.length > 0) {
              const branchName = currentBranchTokens.join(' ')
                .replace(/'/g, "")
                .replace(/^\*+\s*/, "")
                .replace(/[^a-zA-Z0-9\s\(\)\&\-]/g, ""); 
                
              const cutoffs = {};
              
              for (let j = 0; j < 24; j++) {
                const val = tokens[i+j];
                cutoffs[CATEGORIES[j]] = (val === '--') ? null : Number(val);
              }
              
              if (branchName.trim().length > 0) {
                 branches[branchName] = cutoffs;
              }
              
              i += 23;
              currentBranchTokens = [];
            } else {
              currentBranchTokens.push(tokens[i]);
            }
          }

          if (Object.keys(branches).length === 0) {
             throw new Error("No valid branches/data found for this college.");
          }

          colleges.push({ id: currentId, name, location, branches });
          successCount++;

        } catch (err) {
          failCount++;
          log(`Skipped [${currentId}]: ${err.message}`, 'err');
        }
      });

      log(`Batch Complete. Success: ${successCount} | Failed: ${failCount}`, successCount > 0 ? 'ok' : 'err');
      generateOutput(colleges);
    }

    function generateOutput(colleges) {
      if (colleges.length === 0) {
        document.getElementById('jsonOutput').value = "// No valid colleges parsed. Check terminal logs.";
        return;
      }

      let out = 'window.XOS_CUTOFF = [\n';

      colleges.forEach(c => {
        const safeName = c.name.replace(/'/g, "\\'");
        const safeLoc = c.location.replace(/'/g, "\\'");
        
        out += `  {\n    id: '${c.id}',\n    name: '${safeName}',\n    location: '${safeLoc}',\n    branches: {\n`;
        
        Object.entries(c.branches).forEach(([bName, bVals]) => {
          out += `      '${bName}': {\n`;
          
          for (let i = 0; i < CATEGORIES.length; i += 3) {
            let rowStr = '';
            for (let j = 0; j < 3; j++) {
              const cat = CATEGORIES[i+j];
              const val = bVals[cat];
              const valStr = val === null ? 'null' : val;
              let pair = `'${cat}':${valStr},`;
              rowStr += (j < 2) ? pair.padEnd(15, ' ') : pair; 
            }
            out += `        ${rowStr}\n`;
          }
          out += `      },\n`;
        });
        out += `    }\n  },\n`;
      });
      
      out += '];';
      document.getElementById('jsonOutput').value = out;
    }

    function copyOutput() {
      const output = document.getElementById('jsonOutput');
      output.select();
      document.execCommand('copy');
      
      const btn = event.target;
      const originalText = btn.innerText;
      btn.innerText = 'Copied!';
      setTimeout(() => btn.innerText = originalText, 2000);
    }
  </script>
</body>
</html>
