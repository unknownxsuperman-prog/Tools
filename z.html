<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x0s · Disha Match | Core + Specializations</title>
  <meta name="description" content="Disha Match Engine — find colleges matching your CET rank across core branches and specializations.">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --xos-bg: #000000;
      --xos-accent: #007aff;
      --xos-accent-glow: rgba(0, 122, 255, 0.15);
      --xos-card: rgba(10, 10, 10, 0.85);
      --xos-border: rgba(255, 255, 255, 0.08);
      --xos-border-hover: rgba(255, 255, 255, 0.14);
      --xos-font: 'Space Grotesk', sans-serif;
      --xos-surface: rgba(255, 255, 255, 0.03);
      --xos-text-primary: #e7e9ea;
      --xos-text-secondary: #71767b;
      --xos-text-tertiary: #536471;
      --xos-divider: rgba(255, 255, 255, 0.06);
      --xos-success: #00ba7c;
      --xos-danger: #f4212e;
      --xos-radius: 16px;
      --xos-radius-sm: 12px;
    }
    body {
      margin: 0; padding: 20px; background: var(--xos-bg); color: var(--xos-text-primary);
      font-family: var(--xos-font); display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; top: -40%; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px; background: radial-gradient(circle, rgba(0, 122, 255, 0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    .xos-panel {
      position: relative; z-index: 1; width: 100%; max-width: 520px; background: var(--xos-card);
      border: 1px solid var(--xos-border); border-radius: 24px; padding: 32px 28px;
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 24px 80px rgba(0,0,0,0.7), 0 8px 32px rgba(0,0,0,0.4);
      animation: panelIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes panelIn { from { opacity:0; transform:translateY(12px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
    /* ===== ONBOARDING MODAL ===== */
    .onboard-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      animation: fadeIn 0.3s ease;
    }
    .onboard-overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .onboard-card {
      background: var(--xos-card); border: 1px solid var(--xos-border); border-radius: 24px;
      padding: 40px 32px; width: 90%; max-width: 380px; text-align: center;
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    .onboard-icon {
      width: 64px; height: 64px; border-radius: 20px; background: var(--xos-accent-glow);
      border: 1px solid rgba(0,122,255,0.15); display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 1.5rem; color: var(--xos-accent);
    }
    .onboard-card h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
    .onboard-card p { font-size: 0.7rem; color: var(--xos-text-tertiary); margin-bottom: 24px; }
    .onboard-input {
      width: 100%; background: var(--xos-surface); border: 1px solid var(--xos-border);
      border-radius: var(--xos-radius-sm); padding: 14px 16px; color: var(--xos-text-primary);
      font-family: var(--xos-font); font-size: 0.88rem; outline: none; transition: all 0.2s ease;
      text-align: center; margin-bottom: 16px;
    }
    .onboard-input::placeholder { color: var(--xos-text-tertiary); }
    .onboard-input:focus { border-color: var(--xos-accent); box-shadow: 0 0 0 3px rgba(0,122,255,0.1); }
    .onboard-btn {
      width: 100%; background: #fff; color: #000; border: none; border-radius: var(--xos-radius-sm);
      padding: 14px; font-family: var(--xos-font); font-size: 0.8rem; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease;
    }
    .onboard-btn:hover { box-shadow: 0 0 30px rgba(255,255,255,0.1); transform: translateY(-1px); }
    .onboard-btn:active { transform: scale(0.98); }
    .onboard-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
    /* ===== HEADER ===== */
    .xos-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--xos-divider);
    }
    .xos-header-left h2 { margin: 0; font-size: 1.15rem; font-weight: 700; color: var(--xos-text-primary); letter-spacing: -0.01em; }
    .xos-header-sub { display: flex; align-items: center; gap: 6px; font-size: 0.65rem; color: var(--xos-text-tertiary); margin-top: 6px; }
    .xos-header-sub i { font-size: 0.55rem; color: var(--xos-accent); }
    .hamburger-btn {
      width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--xos-border);
      background: var(--xos-surface); color: var(--xos-text-primary); font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
    }
    .hamburger-btn:hover { border-color: var(--xos-border-hover); background: rgba(255,255,255,0.06); }
    /* ===== SIDEBAR DRAWER ===== */
    .sidebar-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .sidebar-backdrop.open { opacity: 1; pointer-events: all; }
    .sidebar {
      position: fixed; top: 0; right: -300px; width: 280px; height: 100vh;
      background: rgba(8,8,8,0.98); border-left: 1px solid var(--xos-border);
      z-index: 5001; transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column; padding: 0;
      backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
      box-shadow: -16px 0 48px rgba(0,0,0,0.5);
    }
    .sidebar.open { right: 0; }
    .sidebar-profile {
      padding: 32px 24px 24px; border-bottom: 1px solid var(--xos-divider);
      display: flex; align-items: center; gap: 14px;
    }
    .sidebar-pfp {
      width: 44px; height: 44px; border-radius: 50%; background: var(--xos-accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 700; color: #fff; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,122,255,0.3);
    }
    .sidebar-username { font-size: 0.9rem; font-weight: 600; color: var(--xos-text-primary); }
    .sidebar-usertag { font-size: 0.6rem; color: var(--xos-text-tertiary); margin-top: 2px; }
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border-radius: var(--xos-radius-sm); cursor: pointer; transition: all 0.15s ease;
      color: var(--xos-text-secondary); font-size: 0.82rem; font-weight: 500;
      border: 1px solid transparent;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--xos-text-primary); }
    .sidebar-item.active {
      background: var(--xos-accent-glow); color: var(--xos-accent);
      border-color: rgba(0,122,255,0.12);
    }
    .sidebar-item i { width: 20px; text-align: center; font-size: 0.85rem; }
    .sidebar-item .nav-count {
      margin-left: auto; font-size: 0.6rem; font-weight: 700; background: var(--xos-accent);
      color: #fff; padding: 2px 7px; border-radius: 10px; min-width: 20px; text-align: center;
    }
    .sidebar-footer {
      padding: 16px 24px; border-top: 1px solid var(--xos-divider);
      font-size: 0.55rem; color: var(--xos-text-tertiary); letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    /* ===== VIEWS ===== */
    .app-view { display: none; }
    .app-view.active { display: block; }
    /* ===== VIEW HEADER (for sub-pages) ===== */
    .view-title {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
      padding-bottom: 16px; border-bottom: 1px solid var(--xos-divider);
    }
    .view-title i { color: var(--xos-accent); font-size: 0.9rem; }
    .view-title h3 { font-size: 1rem; font-weight: 700; }
    .view-title .view-count { font-size: 0.6rem; color: var(--xos-text-tertiary); margin-left: auto; }
    /* ===== COLLEGES LIST (WhatsApp style) ===== */
    .college-list { display: flex; flex-direction: column; }
    .college-list-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 4px;
      border-bottom: 1px solid var(--xos-divider); opacity: 0.5;
      cursor: default; transition: opacity 0.2s ease;
    }
    .college-list-pfp {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid var(--xos-border);
    }
    .college-list-info { flex: 1; min-width: 0; }
    .college-list-name {
      font-size: 0.8rem; font-weight: 600; color: var(--xos-text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .college-list-loc {
      font-size: 0.65rem; color: var(--xos-text-tertiary); margin-top: 3px;
      display: flex; align-items: center; gap: 4px;
    }
    .college-list-loc i { font-size: 0.5rem; color: var(--xos-accent); }
    /* ===== BRANCHES LIST ===== */
    .branch-group { margin-bottom: 8px; }
    .branch-core-item {
      display: flex; align-items: center; gap: 12px; padding: 14px 12px;
      background: var(--xos-surface); border: 1px solid var(--xos-border);
      border-radius: var(--xos-radius-sm); cursor: pointer; transition: all 0.2s ease;
      margin-bottom: 4px;
    }
    .branch-core-item:hover { border-color: var(--xos-border-hover); background: rgba(255,255,255,0.04); }
    .branch-core-item i.core-icon { color: var(--xos-accent); font-size: 0.75rem; width: 18px; text-align: center; }
    .branch-core-item .core-name { flex: 1; font-size: 0.78rem; font-weight: 600; }
    .branch-core-item .core-count {
      font-size: 0.55rem; color: var(--xos-text-tertiary); background: var(--xos-surface);
      border: 1px solid var(--xos-divider); padding: 2px 8px; border-radius: 10px;
    }
    .branch-core-item .core-chevron {
      font-size: 0.5rem; color: var(--xos-text-tertiary); transition: transform 0.25s ease;
    }
    .branch-core-item.expanded .core-chevron { transform: rotate(180deg); color: var(--xos-accent); }
    .branch-subs { display: none; padding: 0 0 8px 30px; }
    .branch-subs.show { display: block; }
    .branch-sub-item {
      padding: 10px 12px; font-size: 0.7rem; color: var(--xos-text-secondary);
      border-left: 2px solid var(--xos-divider); margin-bottom: 2px;
      display: flex; align-items: center; gap: 8px; transition: all 0.15s ease;
    }
    .branch-sub-item i { font-size: 0.5rem; color: var(--xos-text-tertiary); }
    /* ===== PRIORITY LIST ===== */
    .priority-empty {
      text-align: center; padding: 60px 20px; color: var(--xos-text-tertiary);
    }
    .priority-empty i { font-size: 2rem; opacity: 0.3; margin-bottom: 12px; display: block; }
    .priority-empty p { font-size: 0.78rem; }
    .priority-empty .hint { font-size: 0.65rem; margin-top: 6px; color: var(--xos-text-tertiary); opacity: 0.7; }
    .priority-card {
      background: var(--xos-surface); border: 1px solid var(--xos-border);
      border-radius: var(--xos-radius); margin-bottom: 10px; overflow: hidden;
      transition: all 0.25s ease;
    }
    .priority-card:hover { border-color: var(--xos-border-hover); }
    .priority-card-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      cursor: pointer; transition: background 0.15s ease;
    }
    .priority-card-header:hover { background: rgba(255,255,255,0.03); }
    .priority-card-pfp {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border: 1px solid var(--xos-border);
    }
    .priority-card-info { flex: 1; min-width: 0; overflow: hidden; }
    .priority-card-name {
      font-size: 0.78rem; font-weight: 600; color: var(--xos-text-primary);
      white-space: nowrap; overflow: hidden;
    }
    .priority-card-name .marquee-inner {
      display: inline-block; animation: marqueeScroll 12s linear infinite;
      padding-right: 60px;
    }
    @keyframes marqueeScroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .priority-card-branch {
      font-size: 0.65rem; color: var(--xos-text-tertiary); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .priority-card-chevron {
      font-size: 0.5rem; color: var(--xos-text-tertiary); transition: transform 0.25s ease; flex-shrink: 0;
    }
    .priority-card.expanded .priority-card-chevron { transform: rotate(180deg); color: var(--xos-accent); }
    .priority-card-details {
      display: none; padding: 0 16px 16px; border-top: 1px solid var(--xos-divider);
      animation: fadeUp 0.25s ease;
    }
    .priority-card.expanded .priority-card-details { display: block; }
    .priority-detail-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--xos-divider);
    }
    .priority-detail-row:last-child { border-bottom: none; }
    .priority-detail-label { font-size: 0.6rem; color: var(--xos-text-tertiary); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 5px; }
    .priority-detail-label i { font-size: 0.5rem; }
    .priority-detail-value { font-size: 0.82rem; font-weight: 600; }
    .priority-remove-btn {
      width: 100%; margin-top: 10px; padding: 10px; background: rgba(244,33,46,0.08);
      border: 1px solid rgba(244,33,46,0.15); border-radius: 10px; color: var(--xos-danger);
      font-family: var(--xos-font); font-size: 0.7rem; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s ease;
    }
    .priority-remove-btn:hover { background: rgba(244,33,46,0.15); }
    /* ===== ADD TO PRIORITY BTN (in results) ===== */
    .add-priority-btn {
      background: transparent; border: 1px solid var(--xos-border); border-radius: 20px;
      padding: 7px 14px; font-size: 0.6rem; color: var(--xos-accent); cursor: pointer;
      font-family: var(--xos-font); font-weight: 600; display: flex; align-items: center;
      gap: 5px; transition: all 0.2s ease; margin-top: 12px;
    }
    .add-priority-btn i { font-size: 0.5rem; }
    .add-priority-btn:hover { background: var(--xos-accent-glow); border-color: rgba(0,122,255,0.2); }
    .add-priority-btn.added {
      color: var(--xos-success); border-color: rgba(0,186,124,0.2);
      pointer-events: none; opacity: 0.7;
    }
    /* ===== FORM ===== */
    .form-group { margin-bottom: 20px; position: relative; }
    .form-label { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; font-weight: 600; color: var(--xos-text-secondary); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
    .form-label i { font-size: 0.6rem; color: var(--xos-accent); width: 14px; text-align: center; }
    .form-label .step-num { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 6px; background: var(--xos-accent-glow); border: 1px solid rgba(0,122,255,0.12); font-size: 0.55rem; font-weight: 700; color: var(--xos-accent); }
    .xos-input { width: 100%; background: var(--xos-surface); border: 1px solid var(--xos-border); border-radius: var(--xos-radius-sm); padding: 14px 16px; color: var(--xos-text-primary); font-family: var(--xos-font); font-size: 0.88rem; outline: none; transition: all 0.2s ease; }
    .xos-input::placeholder { color: var(--xos-text-tertiary); }
    .xos-input:hover { border-color: var(--xos-border-hover); }
    .xos-input:focus { border-color: var(--xos-accent); box-shadow: 0 0 0 3px rgba(0,122,255,0.1), 0 0 20px rgba(0,122,255,0.05); background: rgba(0,122,255,0.02); }
    /* ===== CUSTOM DROPDOWN ===== */
    .xos-dropdown { position: relative; width: 100%; }
    .xos-dropdown-trigger { width: 100%; background: var(--xos-surface); border: 1px solid var(--xos-border); border-radius: var(--xos-radius-sm); padding: 14px 16px; color: var(--xos-text-primary); font-family: var(--xos-font); font-size: 0.88rem; outline: none; transition: all 0.2s ease; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 10px; user-select: none; -webkit-user-select: none; }
    .xos-dropdown-trigger:hover { border-color: var(--xos-border-hover); }
    .xos-dropdown-trigger.open { border-color: var(--xos-accent); box-shadow: 0 0 0 3px rgba(0,122,255,0.1), 0 0 20px rgba(0,122,255,0.05); background: rgba(0,122,255,0.02); }
    .xos-dropdown-trigger .dd-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .xos-dropdown-trigger .dd-text.placeholder { color: var(--xos-text-tertiary); }
    .xos-dropdown-trigger .dd-chevron { font-size: 0.55rem; color: var(--xos-text-tertiary); transition: transform 0.25s ease, color 0.2s ease; flex-shrink: 0; }
    .xos-dropdown-trigger.open .dd-chevron { transform: rotate(180deg); color: var(--xos-accent); }
    .xos-dropdown-menu { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: rgba(12,12,12,0.98); border: 1px solid var(--xos-border); border-radius: var(--xos-radius-sm); z-index: 200; display: none; max-height: 260px; overflow-y: auto; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04); animation: dropIn 0.15s ease; }
    .xos-dropdown-menu.show { display: block; }
    .xos-dropdown-menu::-webkit-scrollbar { width: 4px; }
    .xos-dropdown-menu::-webkit-scrollbar-track { background: transparent; }
    .xos-dropdown-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .xos-dropdown-item { padding: 12px 16px; font-size: 0.78rem; color: var(--xos-text-secondary); cursor: pointer; border-bottom: 1px solid var(--xos-divider); transition: all 0.15s ease; display: flex; align-items: center; gap: 10px; }
    .xos-dropdown-item:last-child { border-bottom: none; }
    .xos-dropdown-item:hover { background: rgba(0,122,255,0.06); color: var(--xos-text-primary); }
    .xos-dropdown-item.selected { color: var(--xos-accent); }
    .xos-dropdown-item .dd-item-icon { font-size: 0.5rem; width: 14px; text-align: center; flex-shrink: 0; color: var(--xos-text-tertiary); transition: color 0.15s ease; }
    .xos-dropdown-item:hover .dd-item-icon { color: var(--xos-accent); }
    .xos-dropdown-item.selected .dd-item-icon { color: var(--xos-accent); }
    .xos-dropdown-search { position: sticky; top: 0; background: rgba(12,12,12,0.98); padding: 10px 14px; border-bottom: 1px solid var(--xos-divider); z-index: 1; }
    .xos-dropdown-search input { width: 100%; background: var(--xos-surface); border: 1px solid var(--xos-border); border-radius: 8px; padding: 8px 12px 8px 30px; color: var(--xos-text-primary); font-family: var(--xos-font); font-size: 0.75rem; outline: none; transition: border-color 0.2s ease; }
    .xos-dropdown-search input::placeholder { color: var(--xos-text-tertiary); }
    .xos-dropdown-search input:focus { border-color: var(--xos-accent); }
    .xos-dropdown-search i { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); font-size: 0.55rem; color: var(--xos-text-tertiary); pointer-events: none; }
    /* ===== BUTTON ===== */
    .xos-btn { width: 100%; background: #fff; color: #000; border: none; border-radius: var(--xos-radius-sm); padding: 15px; font-family: var(--xos-font); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; position: relative; overflow: hidden; }
    .xos-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%); transform: translateX(-100%); transition: transform 0.5s ease; }
    .xos-btn:hover::before { transform: translateX(100%); }
    .xos-btn:hover { box-shadow: 0 0 30px rgba(255,255,255,0.1); transform: translateY(-1px); }
    .xos-btn:active { transform: scale(0.98) translateY(0); }
    .xos-btn i { font-size: 0.7rem; transition: transform 0.2s ease; }
    .xos-btn:hover i { transform: translateX(3px); }
    /* ===== SUGGEST BOX ===== */
    .suggest-box { position: absolute; top: calc(100% + 6px); left: 0; right: 0; background: rgba(12,12,12,0.98); border: 1px solid var(--xos-border); border-radius: var(--xos-radius-sm); z-index: 100; display: none; max-height: 240px; overflow-y: auto; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 16px 48px rgba(0,0,0,0.6); animation: dropIn 0.15s ease; }
    @keyframes dropIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    .suggest-box::-webkit-scrollbar { width: 4px; }
    .suggest-box::-webkit-scrollbar-track { background: transparent; }
    .suggest-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .suggest-item { padding: 12px 16px; font-size: 0.78rem; color: var(--xos-text-secondary); cursor: pointer; border-bottom: 1px solid var(--xos-divider); transition: all 0.15s ease; display: flex; align-items: center; gap: 10px; }
    .suggest-item::before { content: '\f054'; font-family: 'Font Awesome 6 Free'; font-weight: 900; font-size: 0.45rem; color: var(--xos-text-tertiary); transition: color 0.15s ease; }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover { background: rgba(0,122,255,0.06); color: var(--xos-text-primary); }
    .suggest-item:hover::before { color: var(--xos-accent); }
    /* ===== RESULTS ===== */
    .results-container { margin-top: 28px; display: none; border-top: 1px solid var(--xos-divider); padding-top: 24px; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .result-card { background: var(--xos-surface); border: 1px solid var(--xos-border); border-radius: var(--xos-radius); padding: 18px; margin-bottom: 12px; transition: all 0.25s ease; position: relative; }
    .result-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,122,255,0.15), transparent); opacity: 0; transition: opacity 0.25s ease; }
    .result-card:hover { border-color: var(--xos-border-hover); background: rgba(255,255,255,0.04); }
    .result-card:hover::before { opacity: 1; }
    .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .college-id { font-size: 0.55rem; font-weight: 700; color: var(--xos-text-tertiary); letter-spacing: 0.1em; display: flex; align-items: center; gap: 5px; background: var(--xos-surface); padding: 3px 8px; border-radius: 6px; border: 1px solid var(--xos-divider); }
    .college-id i { font-size: 0.5rem; color: var(--xos-text-tertiary); }
    .college-name { font-size: 0.9rem; font-weight: 600; line-height: 1.35; margin-bottom: 6px; padding-right: 40px; color: var(--xos-text-primary); }
    .college-loc { font-size: 0.68rem; color: var(--xos-accent); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .college-loc i { font-size: 0.6rem; opacity: 0.8; }
    .branch-name { font-size: 0.7rem; color: var(--xos-text-secondary); margin-bottom: 14px; padding: 6px 10px; background: var(--xos-surface); border-radius: 8px; border: 1px solid var(--xos-divider); display: flex; align-items: center; gap: 8px; }
    .branch-name i { font-size: 0.6rem; color: var(--xos-accent); }
    .cutoff-row { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--xos-divider); padding-top: 14px; flex-wrap: wrap; gap: 10px; }
    .cutoff-block { display: flex; flex-direction: column; gap: 4px; }
    .cutoff-label { font-size: 0.55rem; color: var(--xos-text-tertiary); text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 5px; }
    .cutoff-label i { font-size: 0.5rem; }
    .cutoff-value { font-size: 1.15rem; font-weight: 700; color: var(--xos-text-primary); letter-spacing: -0.01em; }
    .variance { font-size: 0.9rem; font-weight: 700; }
    .variance-positive { color: var(--xos-text-tertiary); }
    .variance-negative { color: var(--xos-text-secondary); }
    .expand-btn { background: transparent; border: 1px solid var(--xos-border); border-radius: 20px; padding: 7px 14px; font-size: 0.6rem; color: var(--xos-accent); cursor: pointer; font-family: var(--xos-font); font-weight: 600; width: auto; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; letter-spacing: 0.02em; }
    .expand-btn i { font-size: 0.5rem; transition: transform 0.25s ease; }
    .expand-btn:hover { background: var(--xos-accent-glow); border-color: rgba(0,122,255,0.2); }
    .expand-btn.active i { transform: rotate(180deg); }
    .subs-list { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--xos-divider); flex-wrap: wrap; gap: 8px; animation: fadeUp 0.25s ease; }
    .subs-list.show { display: flex; }
    .sub-chip { background: var(--xos-surface); border: 1px solid var(--xos-border); border-radius: 20px; padding: 7px 14px; font-size: 0.65rem; cursor: pointer; transition: all 0.2s ease; color: var(--xos-text-secondary); display: flex; align-items: center; gap: 4px; }
    .sub-chip:hover { background: rgba(0,122,255,0.06); border-color: rgba(0,122,255,0.2); color: var(--xos-text-primary); }
    .sub-chip-cutoff { font-size: 0.6rem; color: var(--xos-accent); margin-left: 4px; font-weight: 600; }
    .no-results { text-align: center; color: var(--xos-text-tertiary); font-size: 0.8rem; padding: 40px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .no-results i { font-size: 1.4rem; color: var(--xos-text-tertiary); opacity: 0.5; }
    .result-stats { font-size: 0.62rem; color: var(--xos-text-tertiary); margin-bottom: 16px; letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--xos-surface); border-radius: 10px; border: 1px solid var(--xos-divider); }
    .result-stats i { color: var(--xos-accent); font-size: 0.6rem; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }
    @media (max-width: 560px) {
      body { padding: 12px; }
      .xos-panel { padding: 24px 18px; border-radius: 20px; }
      .cutoff-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
<!-- ===== ONBOARDING MODAL ===== -->
<div class="onboard-overlay" id="onboardModal">
  <div class="onboard-card">
    <div class="onboard-icon"><i class="fa-solid fa-user-astronaut"></i></div>
    <h2>Welcome to Disha</h2>
    <p>Enter your name to get started</p>
    <input type="text" class="onboard-input" id="onboardNameInput" placeholder="Your name..." autocomplete="off" spellcheck="false" maxlength="30">
    <button class="onboard-btn" id="onboardSubmitBtn" disabled>LET'S GO <i class="fa-solid fa-arrow-right"></i></button>
  </div>
</div>
<!-- ===== SIDEBAR BACKDROP ===== -->
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<!-- ===== SIDEBAR DRAWER ===== -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-profile">
    <div class="sidebar-pfp" id="sidebarPfp">?</div>
    <div>
      <div class="sidebar-username" id="sidebarUsername">User</div>
      <div class="sidebar-usertag">CET Explorer</div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-item active" data-view="match" id="navMatch">
      <i class="fa-solid fa-crosshairs"></i> Disha Match
    </div>
    <div class="sidebar-item" data-view="priority" id="navPriority">
      <i class="fa-solid fa-heart"></i> Priority List
      <span class="nav-count" id="navPriorityCount" style="display:none;">0</span>
    </div>
    <div class="sidebar-item" data-view="colleges" id="navColleges">
      <i class="fa-solid fa-building-columns"></i> Colleges
    </div>
    <div class="sidebar-item" data-view="branches" id="navBranches">
      <i class="fa-solid fa-code-branch"></i> Branches
    </div>
  </div>
  <div class="sidebar-footer">x0s · Disha Match v3.0</div>
</div>
<!-- ===== MAIN PANEL ===== -->
<div class="xos-panel">
  <div class="xos-header">
    <div class="xos-header-left">
      <h2 id="headerTitle">Disha Match Engine</h2>
      <div class="xos-header-sub" id="headerSub">
        <i class="fa-solid fa-layer-group"></i>
        <span id="headerSubText">Core + Specializations · ±2000 range</span>
      </div>
    </div>
    <button class="hamburger-btn" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
  </div>
  <!-- ===== VIEW: MATCH ===== -->
  <div class="app-view active" id="view-match">
    <div class="form-group">
      <label class="form-label">
        <span class="step-num">1</span>
        <i class="fa-solid fa-code-branch"></i> Core Branch
      </label>
      <input type="text" id="inputBranch" class="xos-input" placeholder="e.g., COMPUTER SCIENCE AND ENGINEERING" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" name="xos-branch-nonauto" data-form-type="other" data-lpignore="true" aria-autocomplete="list" role="combobox">
      <div id="branchSuggestBox" class="suggest-box"></div>
    </div>
    <div class="form-group">
      <label class="form-label">
        <span class="step-num">2</span>
        <i class="fa-solid fa-tag"></i> Category
      </label>
      <div class="xos-dropdown" id="categoryDropdown">
        <div class="xos-dropdown-trigger" id="categoryTrigger" tabindex="0">
          <span class="dd-text placeholder">Loading categories...</span>
          <i class="fa-solid fa-chevron-down dd-chevron"></i>
        </div>
        <div class="xos-dropdown-menu" id="categoryMenu">
          <div class="xos-dropdown-search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="categorySearchInput" placeholder="Search categories..." autocomplete="off" autocorrect="off" spellcheck="false">
          </div>
          <div id="categoryMenuItems"></div>
        </div>
      </div>
      <input type="hidden" id="inputCategory" value="">
    </div>
    <div class="form-group">
      <label class="form-label">
        <span class="step-num">3</span>
        <i class="fa-solid fa-ranking-star"></i> Your Rank
      </label>
      <input type="number" id="inputRank" class="xos-input" placeholder="Enter CET rank" min="1" autocomplete="off">
    </div>
    <button class="xos-btn" id="searchBtn">
      SEARCH <i class="fa-solid fa-arrow-right"></i>
    </button>
    <div id="resultsArea" class="results-container"></div>
  </div>
  <!-- ===== VIEW: PRIORITY LIST ===== -->
  <div class="app-view" id="view-priority">
    <div class="view-title">
      <i class="fa-solid fa-heart"></i>
      <h3>Priority List</h3>
      <span class="view-count" id="priorityViewCount">0 saved</span>
    </div>
    <div id="priorityListContainer"></div>
  </div>
  <!-- ===== VIEW: COLLEGES ===== -->
  <div class="app-view" id="view-colleges">
    <div class="view-title">
      <i class="fa-solid fa-building-columns"></i>
      <h3>All Colleges</h3>
      <span class="view-count" id="collegesViewCount">0 colleges</span>
    </div>
    <div id="collegesListContainer" class="college-list"></div>
  </div>
  <!-- ===== VIEW: BRANCHES ===== -->
  <div class="app-view" id="view-branches">
    <div class="view-title">
      <i class="fa-solid fa-code-branch"></i>
      <h3>All Branches</h3>
      <span class="view-count" id="branchesViewCount">0 branches</span>
    </div>
    <div id="branchesListContainer"></div>
  </div>
</div>
<script src="./college-data.js"></script>
<script>
  // ============ GLOBAL STATE ============
  let Engine = { branches: [], categories: [], branchToCode: new Map(), codeToBranch: new Map(), specializationMap: new Map() };
  let lastSearchCategory = '';
  // ============ ONBOARDING ============
  function initOnboarding() {
    const saved = localStorage.getItem('xos_username');
    const modal = document.getElementById('onboardModal');
    if (saved) {
      modal.classList.add('hidden');
      applyUsername(saved);
      return;
    }
    const input = document.getElementById('onboardNameInput');
    const btn = document.getElementById('onboardSubmitBtn');
    input.addEventListener('input', () => { btn.disabled = input.value.trim().length === 0; });
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && input.value.trim()) submitOnboard(); });
    btn.addEventListener('click', submitOnboard);
    function submitOnboard() {
      const name = input.value.trim();
      if (!name) return;
      localStorage.setItem('xos_username', name);
      modal.classList.add('hidden');
      applyUsername(name);
    }
    setTimeout(() => input.focus(), 400);
  }
  function applyUsername(name) {
    const letter = name.charAt(0).toUpperCase();
    document.getElementById('sidebarPfp').textContent = letter;
    document.getElementById('sidebarUsername').textContent = name;
  }
  // ============ SIDEBAR ============
  function initSidebar() {
    const btn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    btn.addEventListener('click', () => toggleSidebar(true));
    backdrop.addEventListener('click', () => toggleSidebar(false));
    document.querySelectorAll('.sidebar-item').forEach(item => {
      item.addEventListener('click', () => {
        const view = item.getAttribute('data-view');
        switchView(view);
        toggleSidebar(false);
      });
    });
  }
  function toggleSidebar(open) {
    document.getElementById('sidebar').classList.toggle('open', open);
    document.getElementById('sidebarBackdrop').classList.toggle('open', open);
  }
  // ============ VIEW SWITCHING ============
  function switchView(viewName) {
    document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
    document.getElementById(`view-${viewName}`).classList.add('active');
    document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
    document.querySelector(`.sidebar-item[data-view="${viewName}"]`).classList.add('active');
    const titles = { match: 'Disha Match Engine', priority: 'Priority List', colleges: 'All Colleges', branches: 'All Branches' };
    const subs = { match: 'Core + Specializations · ±2000 range', priority: 'Your saved colleges', colleges: 'Browse all institutions', branches: 'Core & specializations' };
    document.getElementById('headerTitle').textContent = titles[viewName] || '';
    document.getElementById('headerSubText').textContent = subs[viewName] || '';
    if (viewName === 'priority') renderPriorityList();
    if (viewName === 'colleges') renderCollegesList();
    if (viewName === 'branches') renderBranchesList();
  }
  // ============ CLEAN BRANCH NAME ============
  function cleanBranchName(name) {
    if (!name) return '';
    let clean = name.toUpperCase()
      .replace(/^(B\s*TECH\s*IN\s*|BTECH\s*IN\s*|B\.\s*TECH\s*IN\s*|B\s*TECH\s*)/, '')
      .replace(/^[^A-Z]+/, '')
      .replace(/\s*&\s*/g, ' AND ')
      .replace(/DAT A SCIENCE/g, 'DATA SCIENCE')
      .replace(/CYB ER SECURITY/g, 'CYBER SECURITY')
      .replace(/ARTI FICAL/g, 'ARTIFICIAL')
      .replace(/ARTIFICAL/g, 'ARTIFICIAL')
      .replace(/VIRUTAL/g, 'VIRTUAL')
      .replace(/TELECOMMUNICAT ION/g, 'TELECOMMUNICATION')
      .replace(/IND USTRIAL/g, 'INDUSTRIAL')
      .replace(/INTEGTATED/g, 'INTEGRATED')
      .replace(/EXC LUSIVELY/g, 'EXCLUSIVELY')
      .replace(/BLO CK CHAIN/g, 'BLOCK CHAIN')
      .replace(/\bENGG\b/g, 'ENGINEERING')
      .replace(/\bTECH\b/g, 'TECHNOLOGY')
      .replace(/\(/g, ' (')
      .replace(/\s+/g, ' ')
      .replace(/\(\s+/g, '(')
      .replace(/\s+\)/g, ')')
      .trim();
    if (clean === 'COMPUTER SCIENCE' || clean === 'COMPUTER ENGINEERING') clean = 'COMPUTER SCIENCE AND ENGINEERING';
    return clean;
  }
  // ============ BUILD MASTER DATA ============
  function buildMasterData() {
    if (!window.XOS_CUTOFF || !window.XOS_DICT) { console.error("Missing college-data.js"); return false; }
    const branchSet = new Set(), categorySet = new Set();
    for (const [code, rawName] of Object.entries(window.XOS_DICT)) {
      const clean = cleanBranchName(rawName);
      branchSet.add(clean); Engine.branchToCode.set(clean, code); Engine.codeToBranch.set(code, clean);
    }
    for (const college of window.XOS_CUTOFF) {
      if (college.branches) { for (const branchData of Object.values(college.branches)) { for (const cat in branchData) { if (branchData[cat] !== null && branchData[cat] !== undefined) categorySet.add(cat); } } }
    }
    Engine.branches = Array.from(branchSet).sort();
    Engine.categories = Array.from(categorySet).sort();
    for (const [code, rawName] of Object.entries(window.XOS_DICT)) {
      const clean = cleanBranchName(rawName);
      const parenMatch = clean.match(/^(.*?)\s*\((.*)\)$/);
      if (parenMatch) {
        const coreName = parenMatch[1].trim();
        if (!Engine.specializationMap.has(coreName)) Engine.specializationMap.set(coreName, []);
        if (!Engine.specializationMap.get(coreName).includes(clean)) Engine.specializationMap.get(coreName).push(clean);
      }
    }
    for (const [core, specs] of Engine.specializationMap) Engine.specializationMap.set(core, specs.sort());
    return true;
  }
  // ============ CATEGORY DROPDOWN ============
  function populateCategoryDropdown() {
    const hidden = document.getElementById('inputCategory');
    const trigger = document.getElementById('categoryTrigger');
    const menu = document.getElementById('categoryMenu');
    const itemsContainer = document.getElementById('categoryMenuItems');
    const searchInput = document.getElementById('categorySearchInput');
    hidden.value = '';
    function renderItems(filter) {
      const q = (filter || '').toUpperCase();
      const filtered = q ? Engine.categories.filter(c => c.toUpperCase().includes(q)) : Engine.categories;
      if (filtered.length === 0) {
        itemsContainer.innerHTML = '<div class="xos-dropdown-item" style="color:var(--xos-text-tertiary);pointer-events:none;"><i class="fa-regular fa-circle-xmark dd-item-icon"></i> No matching categories</div>';
        return;
      }
      itemsContainer.innerHTML = filtered.map(c => {
        const sel = hidden.value === c;
        return `<div class="xos-dropdown-item${sel ? ' selected' : ''}" data-value="${escapeHtml(c)}"><i class="${sel ? 'fa-solid fa-circle-check' : 'fa-regular fa-circle'} dd-item-icon"></i>${escapeHtml(c)}</div>`;
      }).join('');
      itemsContainer.querySelectorAll('.xos-dropdown-item').forEach(item => {
        item.addEventListener('click', () => {
          hidden.value = item.getAttribute('data-value');
          trigger.querySelector('.dd-text').textContent = hidden.value;
          trigger.querySelector('.dd-text').classList.remove('placeholder');
          closeDD();
        });
      });
    }
    function openDD() { menu.classList.add('show'); trigger.classList.add('open'); searchInput.value = ''; renderItems(''); setTimeout(() => searchInput.focus(), 50); }
    function closeDD() { menu.classList.remove('show'); trigger.classList.remove('open'); }
    function toggleDD() { menu.classList.contains('show') ? closeDD() : openDD(); }
    trigger.addEventListener('click', (e) => { e.stopPropagation(); toggleDD(); });
    trigger.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleDD(); } else if (e.key === 'Escape') closeDD(); });
    searchInput.addEventListener('input', (e) => renderItems(e.target.value));
    searchInput.addEventListener('click', (e) => e.stopPropagation());
    searchInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeDD(); trigger.focus(); } });
    document.addEventListener('click', (e) => { if (!document.getElementById('categoryDropdown').contains(e.target)) closeDD(); });
    trigger.querySelector('.dd-text').textContent = 'Select category...';
    trigger.querySelector('.dd-text').classList.add('placeholder');
    renderItems('');
  }
  // ============ BRANCH AUTOCOMPLETE ============
  function setupAutocomplete() {
    const input = document.getElementById('inputBranch');
    const suggestBox = document.getElementById('branchSuggestBox');
    input.addEventListener('input', (e) => {
      const query = e.target.value.trim().toUpperCase();
      if (!query) { suggestBox.style.display = 'none'; return; }
      const matches = Engine.branches.filter(b => b.includes(query)).slice(0, 6);
      if (matches.length === 0) {
        suggestBox.innerHTML = '<div class="suggest-item" style="color:var(--xos-text-tertiary);pointer-events:none;">No matching branches</div>';
      } else {
        suggestBox.innerHTML = matches.map(m => `<div class="suggest-item" onclick="selectBranch('${m.replace(/'/g, "\\'")}')">${m}</div>`).join('');
      }
      suggestBox.style.display = 'block';
    });
    input.addEventListener('blur', () => setTimeout(() => suggestBox.style.display = 'none', 200));
  }
  window.selectBranch = function(val) { document.getElementById('inputBranch').value = val; document.getElementById('branchSuggestBox').style.display = 'none'; };
  // ============ PRIORITY LIST (localStorage) ============
  function getPriorityList() {
    try { return JSON.parse(localStorage.getItem('xos_priority_list') || '[]'); } catch(e) { return []; }
  }
  function savePriorityList(list) {
    localStorage.setItem('xos_priority_list', JSON.stringify(list));
    updatePriorityCount();
  }
  function addToPriority(item) {
    const list = getPriorityList();
    const key = item.id + '|' + item.branch;
    if (list.find(x => (x.id + '|' + x.branch) === key)) return false;
    list.push(item);
    savePriorityList(list);
    return true;
  }
  function removeFromPriority(id, branch) {
    let list = getPriorityList();
    list = list.filter(x => !((x.id + '|' + x.branch) === (id + '|' + branch)));
    savePriorityList(list);
    renderPriorityList();
  }
  function isInPriority(id, branch) {
    return getPriorityList().some(x => (x.id + '|' + x.branch) === (id + '|' + branch));
  }
  function updatePriorityCount() {
    const count = getPriorityList().length;
    const badge = document.getElementById('navPriorityCount');
    if (count > 0) { badge.textContent = count; badge.style.display = 'inline-block'; }
    else { badge.style.display = 'none'; }
  }
  // ============ RENDER PRIORITY LIST ============
  function renderPriorityList() {
    const container = document.getElementById('priorityListContainer');
    const list = getPriorityList();
    document.getElementById('priorityViewCount').textContent = `${list.length} saved`;
    if (list.length === 0) {
      container.innerHTML = `<div class="priority-empty"><i class="fa-regular fa-heart"></i><p>No colleges saved yet</p><div class="hint">Search and add colleges from Disha Match</div></div>`;
      return;
    }
    container.innerHTML = list.map((item, idx) => {
      const shortName = getShortName(item.name);
      const letter = shortName.charAt(0).toUpperCase();
      return `
        <div class="priority-card" id="pcard_${idx}">
          <div class="priority-card-header" onclick="togglePriorityCard(${idx})">
            <div class="priority-card-pfp">${letter}</div>
            <div class="priority-card-info">
              <div class="priority-card-name"><span class="marquee-inner">${escapeHtml(item.name)}</span></div>
              <div class="priority-card-branch"><i class="fa-solid fa-book" style="font-size:0.5rem;color:var(--xos-accent);margin-right:4px;"></i>${escapeHtml(item.branch)}</div>
            </div>
            <i class="fa-solid fa-chevron-down priority-card-chevron"></i>
          </div>
          <div class="priority-card-details">
            <div class="priority-detail-row">
              <span class="priority-detail-label"><i class="fa-solid fa-location-dot"></i> Location</span>
              <span class="priority-detail-value" style="color:var(--xos-accent);">${escapeHtml(item.location)}</span>
            </div>
            <div class="priority-detail-row">
              <span class="priority-detail-label"><i class="fa-solid fa-hashtag"></i> College ID</span>
              <span class="priority-detail-value">${item.id}</span>
            </div>
            <div class="priority-detail-row">
              <span class="priority-detail-label"><i class="fa-solid fa-chart-line"></i> Cutoff (${escapeHtml(item.category || '')})</span>
              <span class="priority-detail-value">${item.cutoff ? item.cutoff.toLocaleString('en-IN') : '—'}</span>
            </div>
            <div class="priority-detail-row">
              <span class="priority-detail-label"><i class="fa-solid fa-arrow-up-right-dots"></i> Variance</span>
              <span class="priority-detail-value ${item.diff >= 0 ? 'variance-positive' : 'variance-negative'}">${item.diff >= 0 ? '+' : ''}${item.diff}</span>
            </div>
            <button class="priority-remove-btn" onclick="removeFromPriority('${item.id}','${escapeHtml(item.branch).replace(/'/g, "\\'")}')">
              <i class="fa-solid fa-trash"></i> Remove from Priority List
            </button>
          </div>
        </div>`;
    }).join('');
  }
  window.togglePriorityCard = function(idx) {
    const card = document.getElementById(`pcard_${idx}`);
    if (!card) return;
    const wasExpanded = card.classList.contains('expanded');
    // Close all
    document.querySelectorAll('.priority-card.expanded').forEach(c => c.classList.remove('expanded'));
    // Open clicked one if it wasn't already open
    if (!wasExpanded) card.classList.add('expanded');
  };
  // ============ RENDER COLLEGES LIST ============
  function renderCollegesList() {
    const container = document.getElementById('collegesListContainer');
    if (!window.XOS_CUTOFF) { container.innerHTML = '<div class="priority-empty"><i class="fa-solid fa-circle-exclamation"></i><p>Data not loaded</p></div>'; return; }
    const colleges = window.XOS_CUTOFF;
    document.getElementById('collegesViewCount').textContent = `${colleges.length} colleges`;
    container.innerHTML = colleges.map(c => {
      const shortName = getShortName(c.name);
      const letter = shortName.charAt(0).toUpperCase();
      const loc = c.location || 'Karnataka';
      return `
        <div class="college-list-item">
          <div class="college-list-pfp">${letter}</div>
          <div class="college-list-info">
            <div class="college-list-name">${escapeHtml(shortName)}</div>
            <div class="college-list-loc"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(loc)}</div>
          </div>
        </div>`;
    }).join('');
  }
  // ============ RENDER BRANCHES LIST ============
  function renderBranchesList() {
    const container = document.getElementById('branchesListContainer');
    // Separate core branches (no parentheses) from specializations
    const coreBranches = Engine.branches.filter(b => !b.includes('('));
    document.getElementById('branchesViewCount').textContent = `${coreBranches.length} core branches`;
    container.innerHTML = coreBranches.map((core, idx) => {
      const subs = Engine.specializationMap.get(core) || [];
      return `
        <div class="branch-group">
          <div class="branch-core-item" onclick="toggleBranchGroup(${idx})" id="bcore_${idx}">
            <i class="fa-solid fa-microchip core-icon"></i>
            <span class="core-name">${escapeHtml(core)}</span>
            ${subs.length > 0 ? `<span class="core-count">${subs.length} spec${subs.length > 1 ? 's' : ''}</span>` : ''}
            ${subs.length > 0 ? `<i class="fa-solid fa-chevron-down core-chevron"></i>` : ''}
          </div>
          ${subs.length > 0 ? `
            <div class="branch-subs" id="bsubs_${idx}">
              ${subs.map(s => {
                const specPart = s.match(/\((.+)\)$/);
                const specLabel = specPart ? specPart[1] : s;
                return `<div class="branch-sub-item"><i class="fa-solid fa-diagram-project"></i> ${escapeHtml(specLabel)}</div>`;
              }).join('')}
            </div>` : ''}
        </div>`;
    }).join('');
  }
  window.toggleBranchGroup = function(idx) {
    const core = document.getElementById(`bcore_${idx}`);
    const subs = document.getElementById(`bsubs_${idx}`);
    if (!core || !subs) return;
    core.classList.toggle('expanded');
    subs.classList.toggle('show');
  };
  // ============ SEARCH ENGINE ============
  function searchColleges() {
    const targetBranch = document.getElementById('inputBranch').value.trim().toUpperCase();
    const targetCat = document.getElementById('inputCategory').value;
    const userRank = parseInt(document.getElementById('inputRank').value, 10);
    const resultsArea = document.getElementById('resultsArea');
    lastSearchCategory = targetCat;
    if (!targetBranch || !targetCat || isNaN(userRank)) {
      resultsArea.innerHTML = `<div class="no-results"><i class="fa-solid fa-triangle-exclamation"></i> Please fill all fields</div>`;
      resultsArea.style.display = 'block'; return;
    }
    if (!window.XOS_CUTOFF) return;
    let matchingCore = null;
    for (const branch of Engine.branches) { if (branch === targetBranch || branch.includes(targetBranch)) { matchingCore = branch; break; } }
    if (!matchingCore) {
      resultsArea.innerHTML = `<div class="no-results"><i class="fa-solid fa-triangle-exclamation"></i> Branch "${targetBranch}" not found</div>`;
      resultsArea.style.display = 'block'; return;
    }
    const branchesToSearch = [matchingCore];
    const specializations = Engine.specializationMap.get(matchingCore) || [];
    branchesToSearch.push(...specializations);
    const codesToSearch = new Set();
    for (const branch of branchesToSearch) { const code = Engine.branchToCode.get(branch); if (code) codesToSearch.add(code); }
    const RANGE = 2000, matches = [];
    for (const college of window.XOS_CUTOFF) {
      if (!college.branches) continue;
      for (const [branchCode, cutoffData] of Object.entries(college.branches)) {
        if (!codesToSearch.has(branchCode)) continue;
        const cutoff = cutoffData[targetCat];
        if (cutoff === null || cutoff === undefined) continue;
        const diff = cutoff - userRank;
        if (Math.abs(diff) <= RANGE) {
          const branchName = Engine.codeToBranch.get(branchCode) || branchCode;
          matches.push({ id: college.id, name: college.name, location: college.location || 'Karnataka', branch: branchName, cutoff, diff, isSpecialization: branchName !== matchingCore, coreBranch: matchingCore });
        }
      }
    }
    const collegeMap = new Map();
    for (const match of matches) {
      if (!collegeMap.has(match.id)) collegeMap.set(match.id, { id: match.id, name: match.name, location: match.location, coreMatch: null, specializations: [] });
      const cd = collegeMap.get(match.id);
      if (!match.isSpecialization) cd.coreMatch = match; else cd.specializations.push(match);
    }
    const finalResults = [];
    for (const [_, cd] of collegeMap) { if (cd.coreMatch) finalResults.push(cd); }
    finalResults.sort((a, b) => Math.abs(a.coreMatch.diff) - Math.abs(b.coreMatch.diff));
    resultsArea.style.display = 'block';
    if (finalResults.length === 0) {
      resultsArea.innerHTML = `<div class="no-results"><i class="fa-regular fa-folder-open"></i> No colleges found for "${matchingCore}" within ±${RANGE} rank range</div>`;
      return;
    }
    let html = `<div class="result-stats"><i class="fa-solid fa-crosshairs"></i> ${finalResults.length} college(s) · ${branchesToSearch.length} branch(es) searched (core + ${specializations.length} specs)</div>`;
    finalResults.forEach((college, idx) => {
      const core = college.coreMatch, specs = college.specializations;
      const alreadyAdded = isInPriority(core.id, core.branch);
      html += `
        <div class="result-card" id="result_${idx}">
          <div class="result-header"><div class="college-id"><i class="fa-solid fa-hashtag"></i> ${college.id}</div></div>
          <div class="college-name">${escapeHtml(college.name)}</div>
          <div class="college-loc"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(college.location)}</div>
          <div class="branch-name"><i class="fa-solid fa-book"></i> ${core.branch}</div>
          <div class="cutoff-row">
            <div class="cutoff-block">
              <div class="cutoff-label"><i class="fa-solid fa-chart-line"></i> Cutoff (${targetCat})</div>
              <div class="cutoff-value">${core.cutoff.toLocaleString('en-IN')}</div>
            </div>
            <div class="cutoff-block">
              <div class="cutoff-label"><i class="fa-solid fa-arrow-up-right-dots"></i> Variance</div>
              <div class="variance ${core.diff >= 0 ? 'variance-positive' : 'variance-negative'}">${core.diff >= 0 ? '+' : ''}${core.diff}</div>
            </div>
            ${specs.length > 0 ? `<button class="expand-btn" onclick="toggleSpecs(${idx}, this)"><i class="fa-solid fa-chevron-down"></i> ${specs.length} spec${specs.length > 1 ? 's' : ''}</button>` : ''}
          </div>
          <button class="add-priority-btn ${alreadyAdded ? 'added' : ''}" id="addBtn_${idx}" onclick="handleAddPriority(${idx}, '${core.id}', '${escapeHtml(college.name).replace(/'/g, "\\'")}', '${escapeHtml(college.location).replace(/'/g, "\\'")}', '${escapeHtml(core.branch).replace(/'/g, "\\'")}', ${core.cutoff}, ${core.diff})">
            <i class="fa-solid ${alreadyAdded ? 'fa-check' : 'fa-plus'}"></i> ${alreadyAdded ? 'Added' : 'Add to Priority'}
          </button>
          <div class="subs-list" id="specs_${idx}">
            ${specs.map(spec => `<span class="sub-chip" onclick="searchSpecialization('${escapeHtml(spec.branch).replace(/'/g, "\\'")}')">${escapeHtml(spec.branch)} <span class="sub-chip-cutoff">${spec.cutoff.toLocaleString('en-IN')}</span></span>`).join('')}
          </div>
        </div>`;
    });
    resultsArea.innerHTML = html;
  }
  window.handleAddPriority = function(idx, id, name, location, branch, cutoff, diff) {
    const btn = document.getElementById(`addBtn_${idx}`);
    if (!btn || btn.classList.contains('added')) return;
    const success = addToPriority({ id, name, location, branch, cutoff, diff, category: lastSearchCategory });
    if (success) {
      btn.classList.add('added');
      btn.innerHTML = '<i class="fa-solid fa-check"></i> Added';
    }
  };
  window.toggleSpecs = function(idx, btn) { const s = document.getElementById(`specs_${idx}`); if (s) { s.classList.toggle('show'); if (btn) btn.classList.toggle('active'); } };
  window.searchSpecialization = function(branchName) { document.getElementById('inputBranch').value = branchName; searchColleges(); };
  // ============ HELPERS ============
  function getShortName(name) {
    if (!name) return '';
    const commaIdx = name.indexOf(',');
    return commaIdx > 0 ? name.substring(0, commaIdx).trim() : name.trim();
  }
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, m => {
      if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;';
      if (m === '"') return '&quot;'; if (m === "'") return '&#39;'; return m;
    });
  }
  // ============ INITIALIZE ============
  initOnboarding();
  if (buildMasterData()) {
    populateCategoryDropdown();
    setupAutocomplete();
    initSidebar();
    updatePriorityCount();
    document.getElementById('searchBtn').addEventListener('click', searchColleges);
    document.getElementById('inputRank').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchColleges(); });
  } else {
    const trigger = document.getElementById('categoryTrigger');
    if (trigger) { trigger.querySelector('.dd-text').textContent = 'Error loading data'; trigger.querySelector('.dd-text').classList.add('placeholder'); }
  }
</script>
</body>
</html>
