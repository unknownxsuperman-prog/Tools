<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x0s · Disha Match | Core + Specializations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      font-family: 'Inter', sans-serif;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
    }
    .container { max-width: 600px; width: 100%; }
    .panel {
      background: rgba(10, 10, 12, 0.94);
      backdrop-filter: blur(28px);
      border: 1px solid #1e1e24;
      border-radius: 28px;
      padding: 28px 24px;
    }
    .header { display: flex; justify-content: space-between; margin-bottom: 28px; }
    .header h2 { font-size: 1.5rem; font-weight: 700; color: white; }
    .badge { font-size: 0.65rem; color: #007aff; background: rgba(0,122,255,0.1); padding: 4px 12px; border-radius: 40px; }
    .field { margin-bottom: 24px; }
    .label { font-size: 0.7rem; color: #6a6a78; text-transform: uppercase; margin-bottom: 8px; display: block; }
    input, select {
      width: 100%;
      background: #0c0c0e;
      border: 1px solid #2a2a30;
      border-radius: 16px;
      padding: 14px 16px;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    input:focus, select:focus { border-color: #007aff; }
    button {
      width: 100%;
      background: white;
      color: black;
      border: none;
      border-radius: 40px;
      padding: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
    button:active { transform: scale(0.97); }
    
    /* Core branch groups */
    .core-group {
      margin-top: 12px;
      border: 1px solid #1e1e24;
      border-radius: 16px;
      overflow: hidden;
    }
    .core-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
    }
    .arrow {
      font-size: 14px;
      transition: transform 0.2s;
      color: #007aff;
    }
    .arrow.open { transform: rotate(90deg); }
    .core-name { font-weight: 600; flex: 1; }
    .spec-count { font-size: 0.65rem; color: #6a6a78; }
    .sub-list {
      display: none;
      padding: 12px 16px;
      flex-wrap: wrap;
      gap: 8px;
      border-top: 1px solid #1e1e24;
    }
    .sub-list.show { display: flex; }
    .sub-chip {
      background: #0c0c0e;
      border: 1px solid #2a2a30;
      border-radius: 40px;
      padding: 6px 14px;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .sub-chip:hover { background: #1c1c24; border-color: #007aff; }
    
    .result-card {
      background: #0c0c0e;
      border: 1px solid #1e1e24;
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .result-name { font-weight: 600; margin-bottom: 4px; }
    .result-loc { font-size: 0.65rem; color: #007aff; margin-bottom: 8px; }
    .result-branch { font-size: 0.7rem; color: #aaa; margin-bottom: 12px; }
    .result-stats { display: flex; justify-content: space-between; border-top: 1px solid #1e1e24; padding-top: 12px; }
    .cutoff { font-size: 1.2rem; font-weight: 700; }
    .variance { font-size: 0.8rem; color: #8a8a9a; }
    .no-results { text-align: center; padding: 40px; color: #6a6a78; }
    .results-panel { margin-top: 24px; display: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="panel">
    <div class="header">
      <h2>disha · match</h2>
      <div class="badge">v2.0 · core + specs</div>
    </div>

    <div class="field">
      <label class="label">① select branch (core or specialization)</label>
      <input type="text" id="branchInput" placeholder="Type or click a branch below...">
    </div>

    <!-- Core + Specializations hierarchy (built from college-data.js) -->
    <div id="branchHierarchy"></div>

    <div class="field">
      <label class="label">② reservation category</label>
      <select id="categorySelect"><option>Loading categories...</option></select>
    </div>

    <div class="field">
      <label class="label">③ your CET rank</label>
      <input type="number" id="rankInput" placeholder="Enter rank">
    </div>

    <button id="searchBtn">🔍 find colleges →</button>

    <div id="results" class="results-panel"></div>
  </div>
</div>

<script src="./college-data.js"></script>
<script>
  // Wait for college-data.js to load
  if (!window.XOS_CUTOFF || !window.XOS_DICT) {
    document.body.innerHTML = '<div style="color:red; padding:40px;">❌ college-data.js not found! Make sure the file is in the same folder.</div>';
  } else {
    initApp();
  }

  function initApp() {
    // ---- STEP 1: Parse all branches from XOS_DICT ----
    // Structure: Map<coreName, Array<{code, fullName, isSpecialization?}]>
    const cores = new Map(); // core name -> { specs: [], codes: [] }
    const allBranchNames = []; // for autocomplete
    
    for (const [code, fullName] of Object.entries(window.XOS_DICT)) {
      let name = fullName.toUpperCase().trim();
      
      // Check if it's a specialization (has parentheses or dash)
      let isSpec = false;
      let coreName = name;
      let specName = null;
      
      // Pattern: "COMPUTER SCIENCE AND ENGINEERING (ARTIFICIAL INTELLIGENCE AND MACHINE LEARNING)"
      const parenMatch = name.match(/^(.*?)\s*\((.*)\)$/);
      if (parenMatch) {
        coreName = parenMatch[1].trim();
        specName = parenMatch[2].trim();
        isSpec = true;
      }
      
      // Pattern with dash: "COMPUTER SCIENCE AND ENGINEERING - DATA SCIENCE"
      const dashMatch = name.match(/^(.*?)\s*-\s*(.*)$/);
      if (!isSpec && dashMatch) {
        coreName = dashMatch[1].trim();
        specName = dashMatch[2].trim();
        isSpec = true;
      }
      
      // Normalize core names
      if (coreName === 'COMPUTER SCIENCE') coreName = 'COMPUTER SCIENCE AND ENGINEERING';
      if (coreName === 'COMPUTER ENGINEERING') coreName = 'COMPUTER SCIENCE AND ENGINEERING';
      
      if (!cores.has(coreName)) {
        cores.set(coreName, { specs: [], codes: [], fullNames: [] });
      }
      
      const coreData = cores.get(coreName);
      coreData.codes.push(code);
      coreData.fullNames.push(name);
      
      if (isSpec && specName) {
        coreData.specs.push({ name: specName, code: code, fullName: name });
      } else {
        // This is the core branch itself
        coreData.coreCode = code;
        coreData.coreFullName = name;
      }
      
      allBranchNames.push({ name: name, code: code, isSpec: isSpec });
    }
    
    // Sort cores alphabetically
    const sortedCores = Array.from(cores.keys()).sort();
    
    // ---- STEP 2: Render branch hierarchy (core + expandable specs) ----
    const hierarchyDiv = document.getElementById('branchHierarchy');
    let hierarchyHtml = '';
    
    for (const coreName of sortedCores) {
      const data = cores.get(coreName);
      const hasSpecs = data.specs && data.specs.length > 0;
      const coreId = coreName.replace(/[^a-z0-9]/gi, '_');
      
      hierarchyHtml += `
        <div class="core-group">
          <div class="core-header" data-core="${coreName}" data-code="${data.coreCode || ''}">
            <span class="arrow" id="arrow_${coreId}">▶</span>
            <span class="core-name">${coreName}</span>
            ${hasSpecs ? `<span class="spec-count">${data.specs.length} specializations</span>` : ''}
          </div>
          <div class="sub-list" id="subs_${coreId}">
            ${hasSpecs ? data.specs.map(s => `
              <span class="sub-chip" data-branch="${s.fullName}" data-code="${s.code}">${s.name}</span>
            `).join('') : '<span style="font-size:0.7rem; color:#6a6a78;">No specializations listed</span>'}
          </div>
        </div>
      `;
    }
    hierarchyDiv.innerHTML = hierarchyHtml;
    
    // Attach click handlers for core headers (toggle specs)
    document.querySelectorAll('.core-header').forEach(header => {
      const coreName = header.getAttribute('data-core');
      const coreCode = header.getAttribute('data-code');
      const coreId = coreName.replace(/[^a-z0-9]/gi, '_');
      const arrow = document.getElementById(`arrow_${coreId}`);
      const subsDiv = document.getElementById(`subs_${coreId}`);
      
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        if (subsDiv) {
          subsDiv.classList.toggle('show');
          if (arrow) arrow.classList.toggle('open');
        }
      });
      
      // Also allow clicking core name to select it
      const coreNameSpan = header.querySelector('.core-name');
      if (coreNameSpan) {
        coreNameSpan.style.cursor = 'pointer';
        coreNameSpan.addEventListener('click', (e) => {
          e.stopPropagation();
          if (coreCode) {
            const fullBranchName = cores.get(coreName)?.coreFullName || coreName;
            document.getElementById('branchInput').value = fullBranchName;
          }
        });
      }
    });
    
    // Attach click handlers for sub-chips (specializations)
    document.querySelectorAll('.sub-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const branchName = chip.getAttribute('data-branch');
        if (branchName) {
          document.getElementById('branchInput').value = branchName;
        }
      });
    });
    
    // ---- STEP 3: Extract all categories from cutoff data ----
    const categories = new Set();
    for (const college of window.XOS_CUTOFF) {
      if (college.branches) {
        for (const branchData of Object.values(college.branches)) {
          for (const cat in branchData) {
            if (branchData[cat] !== null && branchData[cat] !== undefined) {
              categories.add(cat);
            }
          }
        }
      }
    }
    
    const catSelect = document.getElementById('categorySelect');
    catSelect.innerHTML = '<option value="">Select category...</option>' + 
      Array.from(categories).sort().map(c => `<option value="${c}">${c}</option>`).join('');
    
    // ---- STEP 4: Search function (matches branch code to cutoff) ----
    function findBranchCode(branchName) {
      if (!branchName) return null;
      const upperName = branchName.toUpperCase().trim();
      
      // Find matching code from XOS_DICT
      for (const [code, name] of Object.entries(window.XOS_DICT)) {
        if (name.toUpperCase() === upperName) return code;
        if (name.toUpperCase().includes(upperName)) return code;
      }
      return null;
    }
    
    function searchColleges() {
      const branchInput = document.getElementById('branchInput').value.trim();
      const category = document.getElementById('categorySelect').value;
      const rank = parseInt(document.getElementById('rankInput').value, 10);
      const resultsDiv = document.getElementById('results');
      
      if (!branchInput) {
        resultsDiv.innerHTML = '<div class="no-results">⚠️ Select a branch first</div>';
        resultsDiv.style.display = 'block';
        return;
      }
      if (!category) {
        resultsDiv.innerHTML = '<div class="no-results">⚠️ Select a category</div>';
        resultsDiv.style.display = 'block';
        return;
      }
      if (isNaN(rank) || rank <= 0) {
        resultsDiv.innerHTML = '<div class="no-results">⚠️ Enter a valid rank</div>';
        resultsDiv.style.display = 'block';
        return;
      }
      
      // Find branch code(s) - support partial matches
      const matchedCodes = new Set();
      for (const [code, name] of Object.entries(window.XOS_DICT)) {
        if (name.toUpperCase().includes(branchInput.toUpperCase())) {
          matchedCodes.add(code);
        }
      }
      
      if (matchedCodes.size === 0) {
        resultsDiv.innerHTML = `<div class="no-results">No branch matching "${branchInput}" found in database</div>`;
        resultsDiv.style.display = 'block';
        return;
      }
      
      // Search colleges
      const matches = [];
      const RANGE = 2000;
      
      for (const college of window.XOS_CUTOFF) {
        if (!college.branches) continue;
        
        for (const [branchCode, cutoffData] of Object.entries(college.branches)) {
          if (!matchedCodes.has(branchCode)) continue;
          
          const cutoff = cutoffData[category];
          if (cutoff === null || cutoff === undefined) continue;
          
          const diff = cutoff - rank;
          if (Math.abs(diff) <= RANGE) {
            const branchFullName = window.XOS_DICT[branchCode] || branchCode;
            matches.push({
              id: college.id,
              name: college.name,
              location: college.location,
              branch: branchFullName,
              cutoff: cutoff,
              diff: diff
            });
          }
        }
      }
      
      matches.sort((a, b) => Math.abs(a.diff) - Math.abs(b.diff));
      
      // Display results
      resultsDiv.style.display = 'block';
      if (matches.length === 0) {
        resultsDiv.innerHTML = `<div class="no-results">No colleges found within ±${RANGE} rank range</div>`;
        return;
      }
      
      resultsDiv.innerHTML = `
        <div style="font-size:0.7rem; color:#6a6a78; margin-bottom:12px;">🎯 ${matches.length} matching college(s)</div>
        ${matches.slice(0, 20).map(m => `
          <div class="result-card">
            <div class="result-name">${m.name}</div>
            <div class="result-loc">📍 ${m.location || 'Karnataka'}</div>
            <div class="result-branch">📘 ${m.branch}</div>
            <div class="result-stats">
              <div><span style="font-size:0.65rem;">cutoff (${category})</span><br><span class="cutoff">${m.cutoff.toLocaleString()}</span></div>
              <div><span style="font-size:0.65rem;">variance</span><br><span class="variance">${m.diff >= 0 ? '+' : ''}${m.diff}</span></div>
            </div>
          </div>
        `).join('')}
        ${matches.length > 20 ? `<div class="no-results" style="padding:12px;">+ ${matches.length - 20} more results</div>` : ''}
      `;
    }
    
    document.getElementById('searchBtn').addEventListener('click', searchColleges);
    document.getElementById('rankInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchColleges();
    });
    
    // Autocomplete on input field (show suggestions)
    const inputField = document.getElementById('branchInput');
    inputField.addEventListener('input', function() {
      const val = this.value.toLowerCase();
      if (!val) return;
      
      const suggestions = allBranchNames.filter(b => b.name.toLowerCase().includes(val)).slice(0, 5);
      // Simple datalist style - we'll just let user type, but they can click hierarchy
    });
  }
</script>
</body>
</html>
