<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>x0s · Disha Match | Core + Specializations</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --xos-bg: #000000;
      --xos-accent: #007aff;
      --xos-card: rgba(10, 10, 10, 0.85);
      --xos-border: #1a1a1a;
      --xos-font: 'Space Grotesk', sans-serif;
    }

    body {
      margin: 0;
      padding: 20px;
      background: var(--xos-bg);
      color: #ffffff;
      font-family: var(--xos-font);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .xos-panel {
      width: 100%;
      max-width: 520px;
      background: var(--xos-card);
      border: 1px solid var(--xos-border);
      border-radius: 24px;
      padding: 28px 24px;
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
    }

    .xos-badge {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--xos-accent);
      background: rgba(0, 122, 255, 0.1);
      border: 1px solid rgba(0, 122, 255, 0.2);
      padding: 3px 10px;
      border-radius: 6px;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 700;
      color: #666;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .xos-input {
      width: 100%;
      background: #000000;
      border: 1px solid var(--xos-border);
      border-radius: 14px;
      padding: 14px 16px;
      color: #ffffff;
      font-family: var(--xos-font);
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s;
    }

    .xos-input:focus {
      border-color: var(--xos-accent);
      box-shadow: 0 0 0 1px rgba(0, 122, 255, 0.3);
    }

    select.xos-input {
      cursor: pointer;
    }

    .xos-btn {
      width: 100%;
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-family: var(--xos-font);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s;
      margin-top: 12px;
    }

    .xos-btn:active {
      transform: scale(0.97);
    }

    .suggest-box {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #0a0a0a;
      border: 1px solid var(--xos-border);
      border-radius: 14px;
      z-index: 100;
      display: none;
      max-height: 220px;
      overflow-y: auto;
    }

    .suggest-item {
      padding: 12px 16px;
      font-size: 0.8rem;
      color: #ccc;
      cursor: pointer;
      border-bottom: 1px solid #1a1a1a;
    }

    .suggest-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
    }

    .results-container {
      margin-top: 28px;
      display: none;
      border-top: 1px solid var(--xos-border);
      padding-top: 24px;
    }

    .result-card {
      background: #000000;
      border: 1px solid var(--xos-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .college-id {
      font-size: 0.55rem;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.1em;
    }

    .college-name {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 4px;
      padding-right: 40px;
    }

    .college-loc {
      font-size: 0.65rem;
      color: var(--xos-accent);
      margin-bottom: 10px;
    }

    .branch-name {
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 12px;
      padding: 4px 0;
    }

    .cutoff-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #1a1a1a;
      padding-top: 12px;
    }

    .cutoff-label {
      font-size: 0.55rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .cutoff-value {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .variance {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .variance-positive { color: #666; }
    .variance-negative { color: #aaa; }

    .expand-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 0.6rem;
      color: var(--xos-accent);
      cursor: pointer;
      font-family: var(--xos-font);
      margin-top: 10px;
      width: auto;
    }

    .expand-btn:hover {
      background: rgba(0, 122, 255, 0.1);
    }

    .subs-list {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1a1a1a;
      flex-wrap: wrap;
      gap: 8px;
    }

    .subs-list.show {
      display: flex;
    }

    .sub-chip {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sub-chip:hover {
      background: #1a1a1a;
      border-color: var(--xos-accent);
    }

    .sub-chip-cutoff {
      font-size: 0.6rem;
      color: var(--xos-accent);
      margin-left: 6px;
    }

    .no-results {
      text-align: center;
      color: #555;
      font-size: 0.8rem;
      padding: 30px 0;
    }

    .result-stats {
      font-size: 0.6rem;
      color: #555;
      margin-bottom: 12px;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

<div class="xos-panel">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px;">
    <div>
      <h2 style="margin: 0; font-size: 1.2rem; font-weight: 700;">Disha Match Engine</h2>
      <div style="font-size: 0.6rem; color: #555; margin-top: 4px;">Core + Specializations · ±2000 range</div>
    </div>
    <span class="xos-badge">v3.0</span>
  </div>

  <div class="form-group">
    <label class="form-label">1. Core Branch</label>
    <input type="text" id="inputBranch" class="xos-input" placeholder="e.g., COMPUTER SCIENCE AND ENGINEERING" autocomplete="off">
    <div id="branchSuggestBox" class="suggest-box"></div>
  </div>

  <div class="form-group">
    <label class="form-label">2. Category</label>
    <select id="inputCategory" class="xos-input">
      <option value="">Loading categories...</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label">3. Your Rank</label>
    <input type="number" id="inputRank" class="xos-input" placeholder="Enter CET rank" min="1">
  </div>

  <button class="xos-btn" id="searchBtn">SEARCH →</button>

  <div id="resultsArea" class="results-container"></div>
</div>

<script src="./college-data.js"></script>

<script>
  // ============ GLOBAL STATE ============
  let Engine = { branches: [], categories: [], branchToCode: new Map(), codeToBranch: new Map(), specializationMap: new Map() };

  // ============ CLEAN BRANCH NAME ============
  function cleanBranchName(name) {
    if (!name) return '';
    let clean = name.toUpperCase()
      .replace(/^(B\s*TECH\s*IN\s*|BTECH\s*IN\s*|B\.\s*TECH\s*IN\s*|B\s*TECH\s*)/, '')
      .replace(/^[^A-Z]+/, '')
      .replace(/\s*&\s*/g, ' AND ')
      .replace(/DAT A SCIENCE/g, 'DATA SCIENCE')
      .replace(/CYB ER SECURITY/g, 'CYBER SECURITY')
      .replace(/ARTI FICAL/g, 'ARTIFICIAL')
      .replace(/ARTIFICAL/g, 'ARTIFICIAL')
      .replace(/VIRUTAL/g, 'VIRTUAL')
      .replace(/TELECOMMUNICAT ION/g, 'TELECOMMUNICATION')
      .replace(/IND USTRIAL/g, 'INDUSTRIAL')
      .replace(/INTEGTATED/g, 'INTEGRATED')
      .replace(/EXC LUSIVELY/g, 'EXCLUSIVELY')
      .replace(/BLO CK CHAIN/g, 'BLOCK CHAIN')
      .replace(/\bENGG\b/g, 'ENGINEERING')
      .replace(/\bTECH\b/g, 'TECHNOLOGY')
      .replace(/\(/g, ' (')
      .replace(/\s+/g, ' ')
      .replace(/\(\s+/g, '(')
      .replace(/\s+\)/g, ')')
      .trim();

    if (clean === 'COMPUTER SCIENCE' || clean === 'COMPUTER ENGINEERING') {
      clean = 'COMPUTER SCIENCE AND ENGINEERING';
    }
    return clean;
  }

  // ============ BUILD MASTER DATA FROM COLLEGE-DATA.JS ============
  function buildMasterData() {
    if (!window.XOS_CUTOFF || !window.XOS_DICT) {
      console.error("Missing college-data.js");
      return false;
    }

    const branchSet = new Set();
    const categorySet = new Set();

    // Build branch mapping from XOS_DICT
    for (const [code, rawName] of Object.entries(window.XOS_DICT)) {
      const clean = cleanBranchName(rawName);
      branchSet.add(clean);
      Engine.branchToCode.set(clean, code);
      Engine.codeToBranch.set(code, clean);
    }

    // Get categories from cutoff data
    for (const college of window.XOS_CUTOFF) {
      if (college.branches) {
        for (const branchData of Object.values(college.branches)) {
          for (const cat in branchData) {
            if (branchData[cat] !== null && branchData[cat] !== undefined) {
              categorySet.add(cat);
            }
          }
        }
      }
    }

    Engine.branches = Array.from(branchSet).sort();
    Engine.categories = Array.from(categorySet).sort();

    // Build specialization map: core branch -> list of specialization branches
    for (const [code, rawName] of Object.entries(window.XOS_DICT)) {
      const clean = cleanBranchName(rawName);
      
      // Check if this is a specialization (has parentheses after core name)
      const parenMatch = clean.match(/^(.*?)\s*\((.*)\)$/);
      if (parenMatch) {
        const coreName = parenMatch[1].trim();
        const specName = clean;
        
        if (!Engine.specializationMap.has(coreName)) {
          Engine.specializationMap.set(coreName, []);
        }
        if (!Engine.specializationMap.get(coreName).includes(specName)) {
          Engine.specializationMap.get(coreName).push(specName);
        }
      }
    }

    // Sort specializations for each core
    for (const [core, specs] of Engine.specializationMap) {
      Engine.specializationMap.set(core, specs.sort());
    }

    return true;
  }

  // ============ POPULATE UI ============
  function populateCategoryDropdown() {
    const catSelect = document.getElementById('inputCategory');
    catSelect.innerHTML = '<option value="">Select category...</option>' + 
      Engine.categories.map(c => `<option value="${c}">${c}</option>`).join('');
  }

  function setupAutocomplete() {
    const input = document.getElementById('inputBranch');
    const suggestBox = document.getElementById('branchSuggestBox');

    input.addEventListener('input', (e) => {
      const query = e.target.value.trim().toUpperCase();
      if (!query) {
        suggestBox.style.display = 'none';
        return;
      }
      
      const matches = Engine.branches.filter(b => b.includes(query)).slice(0, 6);
      if (matches.length === 0) {
        suggestBox.innerHTML = '<div class="suggest-item" style="color:#555;">No matching branches</div>';
      } else {
        suggestBox.innerHTML = matches.map(m => `
          <div class="suggest-item" onclick="selectBranch('${m.replace(/'/g, "\\'")}')">${m}</div>
        `).join('');
      }
      suggestBox.style.display = 'block';
    });

    input.addEventListener('blur', () => {
      setTimeout(() => suggestBox.style.display = 'none', 200);
    });
  }

  window.selectBranch = function(val) {
    document.getElementById('inputBranch').value = val;
    document.getElementById('branchSuggestBox').style.display = 'none';
  };

  // ============ SEARCH ENGINE ============
  function searchColleges() {
    const targetBranch = document.getElementById('inputBranch').value.trim().toUpperCase();
    const targetCat = document.getElementById('inputCategory').value;
    const userRank = parseInt(document.getElementById('inputRank').value, 10);
    const resultsArea = document.getElementById('resultsArea');

    if (!targetBranch || !targetCat || isNaN(userRank)) {
      resultsArea.innerHTML = `<div class="no-results">⚠️ Please fill all fields</div>`;
      resultsArea.style.display = 'block';
      return;
    }

    if (!window.XOS_CUTOFF) return;

    // Find the exact core branch and its specializations
    let matchingCore = null;
    for (const branch of Engine.branches) {
      if (branch === targetBranch || branch.includes(targetBranch)) {
        matchingCore = branch;
        break;
      }
    }

    if (!matchingCore) {
      resultsArea.innerHTML = `<div class="no-results">⚠️ Branch "${targetBranch}" not found</div>`;
      resultsArea.style.display = 'block';
      return;
    }

    // Get all branch codes to search (core + its specializations)
    const branchesToSearch = [matchingCore];
    const specializations = Engine.specializationMap.get(matchingCore) || [];
    branchesToSearch.push(...specializations);

    // Get codes for all these branches
    const codesToSearch = new Set();
    for (const branch of branchesToSearch) {
      const code = Engine.branchToCode.get(branch);
      if (code) codesToSearch.add(code);
    }

    const RANGE = 2000;
    const matches = [];

    for (const college of window.XOS_CUTOFF) {
      if (!college.branches) continue;
      
      for (const [branchCode, cutoffData] of Object.entries(college.branches)) {
        if (!codesToSearch.has(branchCode)) continue;
        
        const cutoff = cutoffData[targetCat];
        if (cutoff === null || cutoff === undefined) continue;
        
        const diff = cutoff - userRank;
        if (Math.abs(diff) <= RANGE) {
          const branchName = Engine.codeToBranch.get(branchCode) || branchCode;
          const isSpec = branchName !== matchingCore;
          
          matches.push({
            id: college.id,
            name: college.name,
            location: college.location || 'Karnataka',
            branch: branchName,
            cutoff: cutoff,
            diff: diff,
            isSpecialization: isSpec,
            coreBranch: matchingCore
          });
        }
      }
    }

    // Group matches by college
    const collegeMap = new Map();
    for (const match of matches) {
      if (!collegeMap.has(match.id)) {
        collegeMap.set(match.id, {
          id: match.id,
          name: match.name,
          location: match.location,
          coreMatch: null,
          specializations: []
        });
      }
      
      const collegeData = collegeMap.get(match.id);
      if (!match.isSpecialization) {
        collegeData.coreMatch = match;
      } else {
        collegeData.specializations.push(match);
      }
    }

    // Build results array
    const finalResults = [];
    for (const [_, collegeData] of collegeMap) {
      if (collegeData.coreMatch) {
        finalResults.push(collegeData);
      }
    }
    
    // Sort by variance of core branch
    finalResults.sort((a, b) => Math.abs(a.coreMatch.diff) - Math.abs(b.coreMatch.diff));

    // Render
    resultsArea.style.display = 'block';
    if (finalResults.length === 0) {
      resultsArea.innerHTML = `<div class="no-results">No colleges found for "${matchingCore}" within ±${RANGE} rank range</div>`;
      return;
    }

    let html = `<div class="result-stats">🎯 ${finalResults.length} college(s) · ${branchesToSearch.length} branch(es) searched (core + ${specializations.length} specs)</div>`;
    
    finalResults.forEach((college, idx) => {
      const core = college.coreMatch;
      const specs = college.specializations;
      
      html += `
        <div class="result-card" id="result_${idx}">
          <div class="result-header">
            <div class="college-id">${college.id}</div>
          </div>
          <div class="college-name">${escapeHtml(college.name)}</div>
          <div class="college-loc">📍 ${escapeHtml(college.location)}</div>
          <div class="branch-name">📘 ${core.branch}</div>
          <div class="cutoff-row">
            <div>
              <div class="cutoff-label">Cutoff (${targetCat})</div>
              <div class="cutoff-value">${core.cutoff.toLocaleString('en-IN')}</div>
            </div>
            <div>
              <div class="cutoff-label">Variance</div>
              <div class="variance ${core.diff >= 0 ? 'variance-positive' : 'variance-negative'}">
                ${core.diff >= 0 ? '+' : ''}${core.diff}
              </div>
            </div>
            ${specs.length > 0 ? `<button class="expand-btn" onclick="toggleSpecs(${idx})">▼ ${specs.length} specialization${specs.length > 1 ? 's' : ''}</button>` : ''}
          </div>
          <div class="subs-list" id="specs_${idx}">
            ${specs.map(spec => `
              <span class="sub-chip" onclick="searchSpecialization('${escapeHtml(spec.branch).replace(/'/g, "\\'")}')">
                ${escapeHtml(spec.branch)} 
                <span class="sub-chip-cutoff">${spec.cutoff.toLocaleString('en-IN')}</span>
              </span>
            `).join('')}
          </div>
        </div>
      `;
    });
    
    resultsArea.innerHTML = html;
  }

  window.toggleSpecs = function(idx) {
    const subsDiv = document.getElementById(`specs_${idx}`);
    if (subsDiv) {
      subsDiv.classList.toggle('show');
    }
  };

  window.searchSpecialization = function(branchName) {
    document.getElementById('inputBranch').value = branchName;
    searchColleges();
  };

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // ============ INITIALIZE ============
  if (buildMasterData()) {
    populateCategoryDropdown();
    setupAutocomplete();
    document.getElementById('searchBtn').addEventListener('click', searchColleges);
    document.getElementById('inputRank').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchColleges();
    });
  } else {
    document.getElementById('inputCategory').innerHTML = '<option>❌ Error loading data</option>';
  }
</script>
</body>
</html>
