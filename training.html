<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X0S System_Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #007aff;
            --card-bg: rgba(10, 10, 10, 0.6);
            --border-color: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .xos1-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
            height: 650px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: transform 0.15s ease-out;
        }

        .xos1-card:active {
            transform: scale(0.99);
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-weight: 400;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .dev-badge {
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-window::-webkit-scrollbar {
            width: 4px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .user-msg {
            background-color: var(--border-color);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            background-color: transparent;
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .bot-msg.error-msg {
            border-color: rgba(255, 59, 48, 0.3);
            color: #ff3b30;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button {
            background-color: var(--accent-color);
            color: #fff;
            border: none;
            padding: 0 24px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }
        
        button:disabled, input:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="xos1-card">
    <div class="header">
        <h4 class="header-title">X0S_Core</h4>
        <div class="dev-badge" id="status-badge">Awaiting INIT</div>
    </div>
    <div class="chat-window" id="chat-window"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Booting parameters..." disabled>
        <button id="send-btn" disabled>SEND</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const inputEl = document.getElementById('user-input');
    const btnEl = document.getElementById('send-btn');
    const badgeEl = document.getElementById('status-badge');

    // Model Architecture State
    let vocab = [];
    let classes = [];
    let weights = [];
    let biases = [];

    function addMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Core Mathematics (Forward Pass)
    function vectorizeText(text) {
        const words = text.toLowerCase().split(/\W+/);
        return vocab.map(v => words.includes(v) ? 1 : 0);
    }

    function softmax(arr) {
        const max = Math.max(...arr);
        const exps = arr.map(x => Math.exp(x - max));
        const sumExp = exps.reduce((a, b) => a + b, 0);
        return exps.map(x => x / sumExp);
    }

    function forwardPass(x) {
        let logits = biases.slice();
        for (let i = 0; i < vocab.length; i++) {
            if (x[i] === 1) {
                for (let j = 0; j < classes.length; j++) {
                    logits[j] += weights[i][j];
                }
            }
        }
        return softmax(logits);
    }

    // Engine Initialization
    async function initializeModel() {
        try {
            badgeEl.innerText = "FETCHING_DATA";
            
            // 1. Fetch JSON from absolute URL
            const response = await fetch('https://unknownxsuperman-prog.github.io/Tools/trainingset.json');
            if (!response.ok) throw new Error(`HTTP ${response.status}: Failed to reach server.`);
            
            const rawData = await response.json();

            badgeEl.innerText = "PARSING";

            // 2. Safely extract array and drop malformed data
            let dataset = Array.isArray(rawData) ? rawData : (rawData.data || rawData.training || []);
            
            if (dataset.length === 0) {
                throw new Error("Dataset found but contains no entries.");
            }

            const validData = dataset.filter((item, index) => {
                if (!item || typeof item.input !== 'string' || typeof item.output !== 'string') {
                    console.warn(`Dropped malformed row at index ${index}`, item);
                    return false; 
                }
                return true;
            });

            if (validData.length === 0) {
                throw new Error("No valid {input, output} schema detected in JSON.");
            }

            badgeEl.innerText = "VECTORIZING";

            // 3. Build vocab and class dictionaries
            const vocabSet = new Set();
            const classesSet = new Set();

            validData.forEach(item => {
                item.input.toLowerCase().split(/\W+/).forEach(w => w && vocabSet.add(w));
                classesSet.add(item.output);
            });

            vocab = Array.from(vocabSet);
            classes = Array.from(classesSet);

            const X = validData.map(item => vectorizeText(item.input));
            const Y = validData.map(item => classes.indexOf(item.output));

            // Initialize optimization tensors
            weights = Array.from({ length: vocab.length }, () => 
                        Array.from({ length: classes.length }, () => Math.random() * 0.2 - 0.1));
            biases = Array(classes.length).fill(0);

            badgeEl.innerText = "OPTIMIZING";
            badgeEl.style.color = "var(--accent-color)";
            badgeEl.style.borderColor = "rgba(0, 122, 255, 0.3)";
            badgeEl.style.background = "rgba(0, 122, 255, 0.1)";

            // 4. Gradient Descent Loop (Non-blocking)
            const epochs = 1000;
            const learningRate = 0.1;
            let currentEpoch = 0;

            function trainStep() {
                for (let step = 0; step < 50; step++) { 
                    if (currentEpoch >= epochs) break;
                    
                    for (let i = 0; i < X.length; i++) {
                        const x = X[i];
                        const targetIdx = Y[i];
                        const probs = forwardPass(x);

                        for (let j = 0; j < classes.length; j++) {
                            const error = probs[j] - (j === targetIdx ? 1 : 0);
                            biases[j] -= learningRate * error;
                            for (let k = 0; k < vocab.length; k++) {
                                if (x[k] === 1) weights[k][j] -= learningRate * error;
                            }
                        }
                    }
                    currentEpoch++;
                }

                if (currentEpoch < epochs) {
                    requestAnimationFrame(trainStep);
                } else {
                    // System Ready
                    badgeEl.innerText = "ONLINE";
                    badgeEl.style.color = "#32d74b";
                    badgeEl.style.borderColor = "rgba(50, 215, 75, 0.3)";
                    badgeEl.style.background = "rgba(50, 215, 75, 0.1)";
                    inputEl.disabled = false;
                    btnEl.disabled = false;
                    inputEl.placeholder = "Enter query...";
                    addMessage(`Model converged. Processed ${validData.length} valid vectors. Ready.`, 'bot-msg');
                }
            }
            
            requestAnimationFrame(trainStep);

        } catch (error) {
            // Error Handling Output
            badgeEl.innerText = "SYS_FAULT";
            badgeEl.style.color = "#ff453a";
            badgeEl.style.borderColor = "rgba(255, 69, 58, 0.3)";
            badgeEl.style.background = "rgba(255, 69, 58, 0.1)";
            addMessage(`EXCEPTION: ${error.message}`, 'bot-msg error-msg');
            console.error("X0S Core Diagnostic:", error);
        }
    }

    // User Interaction
    function handleSend() {
        const text = inputEl.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        inputEl.value = '';

        const vec = vectorizeText(text);
        
        if (vec.every(v => v === 0)) {
            setTimeout(() => addMessage("Unrecognized token sequence.", 'bot-msg'), 300);
            return;
        }

        const probs = forwardPass(vec);
        const maxProb = Math.max(...probs);
        const predictedIdx = probs.indexOf(maxProb);
        
        setTimeout(() => addMessage(classes[predictedIdx], 'bot-msg'), 400);
    }

    btnEl.addEventListener('click', handleSend);
    inputEl.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleSend();
    });

    // Boot
    window.onload = initializeModel;
</script>

</body>
</html>
