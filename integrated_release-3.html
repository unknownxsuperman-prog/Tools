<meta charset="UTF-8">

<style>
:root{
  --bg:#000;--card:#0a0a0a;--border:#1a1a1a;--border2:rgba(255,255,255,.06);
  --accent:#007aff;--text:#fff;--muted:#666;--muted2:#333;
  --glass:rgba(10,10,10,.85);--ease:cubic-bezier(.4,0,.2,1);
  --font:'Space Grotesk',sans-serif;
  --nav-h:62px;--top-h:54px;
}
.light{--bg:#fff;--card:#f5f5f7;--border:#e5e5e5;--border2:rgba(0,0,0,.06);--text:#000;--muted:#888;--muted2:#ddd;--glass:rgba(255,255,255,.9);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);height:100%;overflow:hidden;}
::-webkit-scrollbar{display:none;}

/* TOP BAR */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:60;
  height:var(--top-h);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
}
.light .top-bar{background:rgba(255,255,255,.75);}
.top-left{display:flex;align-items:center;gap:10px;}
.top-pfp{width:32px;height:32px;border-radius:8px;object-fit:cover;border:1px solid var(--border);cursor:pointer;transition:opacity .18s;flex-shrink:0;}
.top-pfp:active{opacity:.7;}
.top-brand{font-size:1.38rem;font-weight:700;letter-spacing:-.03em;color:var(--text);position:absolute;left:50%;transform:translateX(-50%);}
.top-right{display:flex;align-items:center;gap:6px;}
.top-dots{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:.9rem;cursor:pointer;border-radius:8px;
  transition:background .15s;position:relative;
}
.top-dots:active{background:rgba(255,255,255,.08);}

/* floating dropdown */
.top-dropdown{
  position:absolute;top:42px;right:0;
  background:rgba(15,15,15,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;
  padding:6px;
  min-width:180px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);
  display:none;z-index:300;
  animation:fadeInDrop .18s var(--ease);
}
.light .top-dropdown{background:rgba(245,245,247,.95);border-color:rgba(0,0,0,.1);}
.top-dropdown.open{display:block;}
@keyframes fadeInDrop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.top-dd-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  font-size:.78rem;font-weight:600;color:var(--text);
  cursor:pointer;transition:background .15s;
  white-space:nowrap;
}
.top-dd-item:active{background:rgba(255,255,255,.08);}
.light .top-dd-item:active{background:rgba(0,0,0,.06);}
.top-dd-item i{font-size:.85rem;width:16px;text-align:center;color:var(--muted);}
.top-dd-badge i.fa-certificate{background:linear-gradient(45deg,#BF953F,#FCF6BA,#B38728,#FBF5B7,#AA771C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.top-dd-divider{height:1px;background:rgba(255,255,255,.07);margin:4px 0;}
.light .top-dd-divider{background:rgba(0,0,0,.07);}

/* TABS */
.tabs{
  position:fixed;top:var(--top-h);left:0;right:0;z-index:59;
  display:flex;
  background:rgba(0,0,0,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);
}
.light .tabs{background:rgba(255,255,255,.7);}
.tab{flex:1;text-align:center;padding:13px 0 11px;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;position:relative;transition:color .2s;}
.tab.active{color:var(--text);}
.tab.active::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;background:var(--accent);border-radius:2px;}

/* FEED */
.feed{
  position:fixed;top:calc(var(--top-h) + 44px);bottom:var(--nav-h);
  left:0;right:0;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  z-index:1;
}

/* closed overlays don't block touches */
.es-overlay:not(.open):not(.closing),
.search-overlay:not(.open),
.zynx-overlay:not(.open):not(.closing),
.college-profile:not(.open),
.drawer-backdrop:not(.open){
  pointer-events:none !important;
}

/* POST */
.post{
  padding:14px 16px 0;border-bottom:1px solid var(--border2);
  cursor:default;
  transition:background .15s;
}
.post:active{background:rgba(255,255,255,.02);}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.post-avatar-wrap{position:relative;flex-shrink:0;width:40px;height:40px;}
.post-avatar{width:40px;height:40px;border-radius:10px;object-fit:cover;border:1px solid var(--border);display:block;}

/* ── NEW VERIFIED BADGE ── */
.verified-badge {
  position: absolute;
  bottom: -4px;
  right: -4px;
  width: 18px;
  height: 18px;
  z-index: 2;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
  transition: transform 0.25s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.verified-badge img {
  width: 100%;
  height: 100%;
  display: block;
}
.avatar-wrap:hover .verified-badge {
  transform: scale(1.2);
}

.post-meta{flex:1;min-width:0;}
.post-name{
  font-size:.86rem;font-weight:700;
  display:flex;align-items:center;gap:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.post-handle{font-size:.7rem;color:var(--muted);margin-top:1px;}
.post-time{font-size:.66rem;color:var(--muted);}
.post-college-row{
  display:flex;align-items:center;gap:4px;
  font-size:.62rem;color:var(--accent);font-weight:500;
  overflow:hidden;max-width:180px;margin-top:2px;
  white-space:nowrap;
}
.post-college-row i{font-size:.58rem;flex-shrink:0;}
.post-menu{
  color:var(--muted);font-size:.8rem;
  padding:6px 4px 6px 8px;
  cursor:pointer;flex-shrink:0;
  transition:color .15s;
}
.post-menu:active{color:var(--text);}

/* 3:4 media */
.post-media{
  width:100%;aspect-ratio:3/4;
  border-radius:16px;overflow:hidden;
  background:var(--card);margin-bottom:12px;
  position:relative;
}
.post-media img,.post-media video{width:100%;height:100%;object-fit:cover;display:block;}

.post-caption{
  font-size:.83rem;line-height:1.55;color:var(--text);
  margin-bottom:10px;font-weight:300;
  padding:0 2px;
}

/* actions */
.post-actions{
  display:flex;align-items:center;
  padding:6px 0 13px;
  border-top:1px solid var(--border2);
  margin-top:2px;gap:2px;
}
.post-action{
  display:flex;align-items:center;gap:5px;
  padding:6px 10px 6px 0;
  font-size:.72rem;color:var(--muted);font-weight:500;
  cursor:pointer;transition:color .18s;user-select:none;
}
.post-action i{font-size:1rem;transition:transform .18s,color .18s;}
.post-action:active i{transform:scale(.82);}
.post-action.liked{color:#ff3b5c;}
.post-action.liked i{color:#ff3b5c;}
.post-action-spacer{flex:1;}
.post-action.saved i{color:var(--accent);}
@keyframes heartPop{0%{transform:scale(1)}30%{transform:scale(1.5)}60%{transform:scale(.9)}100%{transform:scale(1)}}
.post-action.liked i{animation:heartPop .38s var(--ease);}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:70;
  height:var(--nav-h);
  display:flex;align-items:center;justify-content:space-around;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border2);
  padding-bottom:env(safe-area-inset-bottom);
}
.light .bottom-nav{background:rgba(255,255,255,.88);}
.nav-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 14px;cursor:pointer;
  color:var(--muted);font-size:1.18rem;
  transition:color .18s,transform .14s;
  position:relative;
}
.nav-item.active{color:var(--text);}
.nav-item:active{transform:scale(.88);}
.nav-notif-dot{
  position:absolute;top:4px;right:10px;
  width:7px;height:7px;background:#ff3b5c;border-radius:50%;
  border:1.5px solid var(--bg);
}

/* SLIDE DRAWER */
.drawer-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0);
  pointer-events:none;
  transition:background .32s var(--ease);
}
.drawer-backdrop.open{background:rgba(0,0,0,.6);pointer-events:all;}
.drawer{
  position:fixed;top:0;bottom:0;left:0;z-index:201;
  width:68vw;max-width:260px;
  background:var(--bg);
  transform:translateX(-100%);
  transition:transform .36s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  overflow-y:auto;
}
.drawer-backdrop.open .drawer{transform:translateX(0);}
.drawer-top{padding:20px 16px 14px;}
.drawer-pfp-wrap{position:relative;width:54px;height:54px;margin-bottom:10px;cursor:pointer;}
.drawer-pfp{width:100%;height:100%;border-radius:14px;object-fit:cover;border:1.5px solid var(--border);}
.drawer-name{font-size:.92rem;font-weight:700;margin-bottom:2px;cursor:pointer;}
.drawer-handle{font-size:.68rem;color:var(--muted);margin-bottom:10px;cursor:pointer;}
.drawer-stats{display:flex;gap:14px;font-size:.68rem;color:var(--muted);margin-bottom:14px;}
.drawer-stats b{color:var(--text);font-weight:700;}
.drawer-brand{position:absolute;top:22px;right:16px;font-size:.82rem;font-weight:700;letter-spacing:-.02em;color:var(--muted);}
.drawer-divider{height:1px;background:var(--border);margin:0 0 6px;}
.drawer-nav-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 16px;font-size:.88rem;font-weight:600;
  cursor:pointer;color:var(--text);
  transition:background .15s;
}
.drawer-nav-item:active{background:rgba(255,255,255,.05);}
.drawer-nav-item i{font-size:1rem;width:20px;text-align:center;color:var(--text);}
.drawer-spacer{flex:1;}
.drawer-bottom{padding:16px 20px;border-top:1px solid var(--border);}

.dm-toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 6px;
  border-top:1px solid var(--border);
  margin-top:8px;
}
.dm-toggle-label{font-size:.8rem;font-weight:600;color:var(--text);}
.dm-pill{
  width:46px;height:26px;border-radius:13px;
  background:var(--muted2);
  position:relative;cursor:pointer;
  transition:background .25s;border:none;
  flex-shrink:0;
}
.dm-pill::after{
  content:'';position:absolute;
  width:20px;height:20px;border-radius:50%;background:#fff;
  top:3px;left:3px;
  transition:transform .25s cubic-bezier(.32,.72,0,1);
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.dm-pill.on{background:var(--accent);}
.dm-pill.on::after{transform:translateX(20px);}
.drawer-footer-brand{padding:6px 16px 20px;font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}

<script>
/* ─────────────────────────────────────────
   INITIALISATION (Data from profiles.js)
───────────────────────────────────────── */
const params = new URLSearchParams(window.location.search);
const activeUserId = params.get('user') || 'nikhil';
const activeUser = window.XOS_PROFILES[activeUserId] || window.XOS_PROFILES['nikhil'];

/* Badge image helper */
function getBadgeImg(verified) {
  if (!verified || verified === 'none') return null;
  if (verified === 'gold') return 'badge-gold.png';
  if (verified === 'blue') return 'badge-blue.svg';
  if (verified === 'green') return 'badge-green.svg';
  return null;
}

function renderBadge(container, verified) {
  const src = getBadgeImg(verified);
  if (src) {
    container.innerHTML = `<img src="${src}" alt="verified badge">`;
    container.style.display = 'block';
  } else {
    container.style.display = 'none';
  }
}

/* Apply active user to UI */
function applyActiveUser() {
  document.getElementById('top-pfp-img').src = activeUser.avatar;
  document.getElementById('drawer-pfp-img').src = activeUser.avatar;
  document.getElementById('drawer-display-name').textContent = activeUser.displayName;
  document.getElementById('drawer-handle').textContent = activeUser.handle;
  document.getElementById('drawer-stats').innerHTML = `
    <span><b>${activeUser.following ? activeUser.following.length : 0}</b> Following</span>
    <span><b>${activeUser.followers ? activeUser.followers.length : 0}</b> Followers</span>
  `;
  renderBadge(document.getElementById('drawer-verified-badge'), activeUser.verified);
  renderFeed();
  buildZynxFeed();
}
applyActiveUser();

/* Feed rendering */
function renderFeed() {
  const feed = document.getElementById('feed');
  if (!activeUser.posts || activeUser.posts.length === 0) {
    feed.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);">No posts yet.</div>';
    return;
  }
  feed.innerHTML = activeUser.posts.map((post, i) => {
    const mediaHtml = post.files.map(f => post.type==='video' ? `<video src="${f}" muted autoplay loop playsinline></video>` : `<img src="${f}" loading="lazy">`).join('');
    const badgeImg = getBadgeImg(activeUser.verified);
    return `
    <div class="post">
      <div class="post-header">
        <div class="post-avatar-wrap avatar-wrap">
          <img class="post-avatar" src="${activeUser.avatar}" alt="">
          <div class="verified-badge">${badgeImg ? `<img src="${badgeImg}" alt="">` : ''}</div>
        </div>
        <div class="post-meta">
          <div class="post-name">${activeUser.displayName}</div>
          <div class="post-handle">${activeUser.handle} · ${post.time}</div>
        </div>
        <div class="post-menu" onclick="event.stopPropagation()"><i class="fa-solid fa-ellipsis"></i></div>
      </div>
      <div class="post-media">${mediaHtml}</div>
      <div class="post-caption">${post.caption}</div>
      <div class="post-actions" onclick="event.stopPropagation()">
        <div class="post-action" id="like-${i}" onclick="toggleLike(${i})">
          <i class="fa-regular fa-heart"></i>
          <span>${post.likes}</span>
        </div>
        <div class="post-action-spacer"></div>
        <div class="post-action" onclick="sharePost()"><i class="fa-solid fa-arrow-up-from-bracket"></i></div>
        <div class="post-action" id="save-${i}" onclick="toggleSave(${i})" style="margin-left:4px;">
          <i class="fa-regular fa-bookmark"></i>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* Zynx – builds from all profiles posts */
const ZYNX_POSTS = [];
Object.values(window.XOS_PROFILES).forEach(u => {
  if (u.posts) u.posts.forEach(p => ZYNX_POSTS.push({...p, user: u}));
});

let zynxOpen = false, zCurrentItem = 0;
const zLiked = {}, zSaved = {}, zMuted = {};

function openZynx() {
  if(zynxOpen) return;
  zynxOpen = true;
  openOverlay('zynx');
  setNav('zynx');
  buildZynxFeed();
  document.querySelector('.top-bar').style.display='none';
  document.querySelector('.tabs').style.display='none';
  const el = document.getElementById('zynx-overlay');
  el.style.display='flex';
  el.classList.remove('closing');
  el.classList.add('open');
  setTimeout(() => zPlayCurrent(0), 450);
}

function closeZynx(fromPop) {
  if(!zynxOpen) return;
  zynxOpen = false;
  closeOverlay('zynx', fromPop);
  setNav('home');
  zPauseAll();
  document.querySelector('.top-bar').style.display='';
  document.querySelector('.tabs').style.display='';
  const el = document.getElementById('zynx-overlay');
  el.classList.remove('open');
  el.classList.add('closing');
  setTimeout(() => { el.style.display='none'; el.classList.remove('closing'); }, 380);
}

/* ── UNIFIED OVERLAY MANAGER ── */
let activeOverlay = null;
function openOverlay(name) {
  if (activeOverlay) return;
  activeOverlay = name;
  if (name !== 'drawer') {
    document.querySelector('.top-bar').style.display='none';
    document.querySelector('.tabs').style.display='none';
  }
  history.pushState({overlay: name}, '');
}
function closeOverlay(name, fromPop = false) {
  if (activeOverlay !== name) return;
  activeOverlay = null;
  document.querySelector('.top-bar').style.display='';
  document.querySelector('.tabs').style.display='';
  if (!fromPop) history.back();
}

window.addEventListener('popstate', e => {
  switch(activeOverlay) {
    case 'search': closeSearch(true); break;
    case 'essential': closeEssential(true); break;
    case 'zynx': closeZynx(true); break;
    case 'college': closeCollegeProfile(true); break;
    case 'messages': closeMessages(true); break;
    case 'drawer': closeDrawer(true); break;
  }
});

// ... (all other functions: drawer, top dropdown, search, college, messages, like/save/share) ...

function sharePost() {
  if (navigator.share) navigator.share({title:'x0s.link', url:window.location.href});
  else alert('Link copied!');
}

function handleHomeNav() {
  if (activeOverlay) {
    switch(activeOverlay) {
      case 'essential': closeEssential(); break;
      case 'search': closeSearch(); break;
      case 'zynx': closeZynx(); break;
      case 'college': closeCollegeProfile(); break;
      case 'messages': closeMessages(); break;
      case 'drawer': closeDrawer(); break;
    }
  }
  setNav('home');
}

function handleZynxNav() { openZynx(); }
function handleSearchTap() {
  if (esMode) openEssential(); else openSearch();
}
