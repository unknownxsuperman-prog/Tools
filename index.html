<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DISHA // X-BIT PROTON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #000000;
            --bg-card: #0a0a0a;
            --bg-glass: rgba(15, 15, 15, 0.85);
            --text-main: #ffffff;
            --text-dim: #88929a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-accent: #ffffff;
            --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.6);
            --accent-dot: #ff0000;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        :root.light-theme {
            --bg-base: #f4f5f7;
            --bg-card: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --text-main: #000000;
            --text-dim: #6c737a;
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-accent: #000000;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color var(--transition-smooth);
        }

        .phone-frame {
            width: 100%;
            max-width: 400px;
            height: 100%;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            padding-top: env(safe-area-inset-top, 24px); 
            transition: background-color var(--transition-smooth);
        }

        .top-nav {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .nav-square {
            width: 42px;
            height: 42px;
            background: var(--bg-card);
            border-radius: 14px;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, background-color var(--transition-smooth);
        }

        .nav-square:active { transform: scale(0.95); }

        .app-brand {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .brand-dot {
            width: 5px;
            height: 5px;
            background-color: var(--accent-dot);
            border-radius: 50%;
        }

        .search-container {
            padding: 0 16px;
            margin-bottom: 12px;
            z-index: 10;
        }

        .premium-pill {
            background: var(--bg-card);
            border-radius: 28px;
            height: 54px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), background-color var(--transition-smooth), border-color var(--transition-smooth);
        }

        .premium-pill:active { transform: scale(0.98); }

        .premium-pill.pulse-shift {
            animation: shiftPulse 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes shiftPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.95); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .search-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 14px;
        }

        .search-right {
            font-size: 12px;
            color: var(--text-dim);
            padding-left: 14px;
        }

        .display-viewport {
            flex: 1;
            padding: 0 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .display-viewport::-webkit-scrollbar { display: none; }

        .empty-view {
            margin: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 24px;
        }

        .empty-circle {
            width: 84px;
            height: 84px;
            background: var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px solid var(--border-subtle);
            transition: background-color var(--transition-smooth);
        }

        .empty-title {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .empty-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            max-width: 280px;
            line-height: 1.5;
        }

        .msg-row {
            display: flex;
            width: 100%;
            margin-bottom: 4px;
        }
        
        .msg-row.user-align { justify-content: flex-end; }
        .msg-row.system-align { justify-content: flex-start; }

        /* Modified: Supports extension-injected structures alongside clean raw bubbles */
        .msg-capsule, .es-bubble-user, .es-bubble-sys {
            width: max-content;
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-subtle);
            transform: translateY(12px);
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), background-color var(--transition-smooth);
        }

        .msg-row.user-align .msg-capsule, .es-bubble-user {
            background: var(--text-main);
            color: var(--bg-base);
            border-bottom-right-radius: 4px;
            align-self: flex-end;
            margin-left: auto;
            margin-bottom: 8px;
        }

        .msg-row.system-align .msg-capsule, .es-bubble-sys {
            background: var(--bg-card);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            margin-right: auto;
            margin-bottom: 8px;
        }

        .dock-anchor {
            padding: 8px 16px calc(34px + env(safe-area-inset-bottom, 16px)) 16px;
            z-index: 10;
            background: linear-gradient(to top, var(--bg-base) 60%, rgba(0,0,0,0));
        }

        .glass-dock {
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 10px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: background-color var(--transition-smooth), border-color var(--transition-smooth);
        }

        .glass-dock.highlight-focus {
            border-color: var(--text-main);
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.15);
        }

        .input-row { padding: 4px 12px 0 12px; }

        .input-row input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font-sans);
            font-size: 15px;
            color: var(--text-main);
        }

        .input-row input::placeholder { color: var(--text-dim); opacity: 0.6; }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-left { display: flex; gap: 4px; }

        .action-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            cursor: pointer;
        }

        .action-btn.pill-mode {
            background: var(--bg-card);
            border-radius: 18px;
            padding: 0 14px;
            width: auto;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            gap: 6px;
            border: 1px solid var(--border-subtle);
        }

        .action-btn.submit {
            background: var(--text-main);
            color: var(--bg-base);
            width: 36px;
            height: 36px;
        }

        .sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-slider {
            position: absolute;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            border-right: 1px solid var(--border-subtle);
            z-index: 101;
            display: flex;
            flex-direction: column;
            padding: calc(24px + env(safe-area-inset-top, 24px)) 20px calc(24px + env(safe-area-inset-bottom, 24px)) 20px;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: var(--shadow-soft);
        }

        .sidebar-overlay.active .sidebar-slider { transform: translateX(280px); }

        .slider-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .slider-title { font-size: 15px; font-weight: 600; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

        .slider-menu-list { display: flex; flex-direction: column; gap: 8px; flex: 1; }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .menu-item:hover, .menu-item.active { background-color: var(--bg-base); }

        .slider-footer {
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .toggle-pill {
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .toggle-btn {
            flex: 1;
            border: none;
            background: transparent;
            height: 32px;
            font-family: var(--font-sans);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .toggle-btn.active { color: var(--text-main); }

        .pill-capsule {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(50% - 6px);
            height: 32px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            z-index: 1;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        :root.light-theme .pill-capsule { transform: translateX(100%); }
    </style>
<base target="_blank">

    <!-- Disha AI engine (overrides doEsSearch) -->
    <script src="disha-extensions.js" defer></script>

    <script>
        // Setup base UI functions and a fallback search handler.
        // This stub will be captured by disha-extensions.js as '_orig'
        // and called only for queries Disha doesn't understand.
        window.scrollEsToBottom = function() {
            const viewport = document.getElementById('es-messages');
            if (viewport) viewport.scrollTop = viewport.scrollHeight;
        };

        window.appendEsBubbleUser = function(query) {
            const emptyState = document.getElementById('emptyState');
            if (emptyState && emptyState.parentNode) emptyState.remove();
            
            const viewport = document.getElementById('es-messages');
            const row = document.createElement('div');
            row.className = 'msg-row user-align';
            
            const capsule = document.createElement('div');
            capsule.className = 'msg-capsule';
            capsule.textContent = query;
            
            row.appendChild(capsule);
            viewport.appendChild(row);
            
            setTimeout(() => { capsule.style.transform = 'translateY(0)'; }, 10);
            window.scrollEsToBottom();
        };

        // Original search handler – used as fallback for unrecognized queries.
        window.doEsSearch = function(val) {
            const query = val.trim();
            if (!query) return;

            // Show user bubble
            window.appendEsBubbleUser(query);

            // Show a helpful fallback message
            const viewport = document.getElementById('es-messages');
            const sysRow = document.createElement('div');
            sysRow.className = 'msg-row system-align';
            const sysCapsule = document.createElement('div');
            sysCapsule.className = 'msg-capsule';
            sysCapsule.innerHTML = `⚠️ I'm not sure how to help with that.<br><span style="font-size:0.75rem; color:var(--text-dim);">Try: <strong>kcet predict</strong>, <strong>weather in Mumbai</strong>, <strong>calc 2+2</strong>, or <strong>help</strong>.</span>`;
            sysRow.appendChild(sysCapsule);
            viewport.appendChild(sysRow);
            setTimeout(() => { sysCapsule.style.transform = 'translateY(0)'; }, 10);
            window.scrollEsToBottom();

            // Clear input
            const inp = document.getElementById('es-input');
            if (inp) inp.value = '';
        };

        // UI interactions
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const openSidebar = document.getElementById('openSidebar');
        const closeSidebar = document.getElementById('closeSidebar');
        const dashboardSearchPill = document.getElementById('dashboardSearchPill');
        const inputDockContainer = document.getElementById('inputDockContainer');
        
        const setDark = document.getElementById('setDark');
        const setLight = document.getElementById('setLight');
        const rootElement = document.documentElement;

        openSidebar.addEventListener('click', () => sidebarOverlay.classList.add('active'));
        closeSidebar.addEventListener('click', () => sidebarOverlay.classList.remove('active'));
        sidebarOverlay.addEventListener('click', (e) => { if(e.target === sidebarOverlay) sidebarOverlay.classList.remove('active'); });

        dashboardSearchPill.addEventListener('click', () => {
            dashboardSearchPill.classList.add('pulse-shift');
            inputDockContainer.classList.add('highlight-focus');
            document.getElementById('es-input').focus();
            
            setTimeout(() => { dashboardSearchPill.classList.remove('pulse-shift'); }, 400);
            setTimeout(() => { inputDockContainer.classList.remove('highlight-focus'); }, 800);
        });

        // Dark Mode Toggle (default: ON)
        const darkModeToggle = document.getElementById('darkModeToggle');
        const darkModeSwitch = document.getElementById('darkModeSwitch');
        const darkModeKnob = document.getElementById('darkModeKnob');

        function setDarkMode(isOn) {
            if (isOn) {
                rootElement.classList.remove('light-theme');
                darkModeSwitch.style.background = 'var(--text-main)';
                darkModeKnob.style.transform = 'translateX(0)';
                darkModeKnob.style.right = '2px';
                darkModeKnob.style.left = 'auto';
            } else {
                rootElement.classList.add('light-theme');
                darkModeSwitch.style.background = 'var(--text-dim)';
                darkModeKnob.style.transform = 'translateX(-20px)';
            }
            localStorage.setItem('disha_darkmode', isOn ? 'on' : 'off');
        }

        // Check saved preference (default ON)
        const savedDarkMode = localStorage.getItem('disha_darkmode');
        if (savedDarkMode === 'off') {
            setDarkMode(false);
        } else {
            setDarkMode(true);
        }

        darkModeToggle.addEventListener('click', () => {
            const isCurrentlyDark = !rootElement.classList.contains('light-theme');
            setDarkMode(!isCurrentlyDark);
        });

        const matrixField = document.getElementById('es-input');
        const sendStream = document.getElementById('es-send');

        function executeLocalPipeline() {
            const val = matrixField.value.trim();
            if (!val) return;
            window.doEsSearch(val);
        }

        sendStream.addEventListener('click', executeLocalPipeline);
        matrixField.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeLocalPipeline(); });

        // ====== USER NAME & GREETING SYSTEM ======
        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return 'good morning';
            if (hour < 17) return 'good afternoon';
            return 'good evening';
        }

        function updateGreeting(name) {
            const greetingEl = document.getElementById('greetingText');
            if (greetingEl && name) {
                greetingEl.textContent = `Hey ${name}, ${getTimeGreeting()}`;
            }
        }

        function updateUserProfile(name) {
            const pfp = document.getElementById('userPfp');
            const nameDisplay = document.getElementById('userNameDisplay');
            if (pfp && name) {
                pfp.textContent = name.charAt(0);
            }
            if (nameDisplay && name) {
                nameDisplay.textContent = name;
            }
        }

        function askUserName() {
            const storedName = localStorage.getItem('disha_username');
            if (storedName) {
                updateGreeting(storedName);
                updateUserProfile(storedName);
                return;
            }
            // Create a custom modal for name input
            const modal = document.createElement('div');
            modal.id = 'nameModal';
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000;
                display: flex; align-items: center; justify-content: center;
            `;
            modal.innerHTML = `
                <div style="
                    background: var(--bg-card); border: 1px solid var(--border-subtle);
                    border-radius: 24px; padding: 28px 24px; width: 320px; max-width: 90%;
                    box-shadow: var(--shadow-soft); text-align: center;
                ">
                    <div style="font-size: 32px; margin-bottom: 12px;">👋</div>
                    <h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-main);">What's your name?</h3>
                    <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 20px;">We'll remember it for next time.</p>
                    <input type="text" id="nameInput" placeholder="Enter your name" style="
                        width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid var(--border-subtle);
                        background: var(--bg-base); color: var(--text-main); font-family: var(--font-sans);
                        font-size: 15px; outline: none; margin-bottom: 16px;
                    " autocomplete="off">
                    <button id="saveNameBtn" style="
                        width: 100%; padding: 12px; border-radius: 14px; border: none;
                        background: var(--text-main); color: var(--bg-base); font-family: var(--font-sans);
                        font-size: 15px; font-weight: 600; cursor: pointer;
                    ">Continue</button>
                </div>
            `;
            document.body.appendChild(modal);
            const nameInput = document.getElementById('nameInput');
            const saveBtn = document.getElementById('saveNameBtn');

            function saveName() {
                const name = nameInput.value.trim();
                if (name) {
                    localStorage.setItem('disha_username', name);
                    updateGreeting(name);
                    updateUserProfile(name);
                    modal.remove();
                } else {
                    nameInput.style.borderColor = 'var(--accent-dot)';
                    nameInput.focus();
                }
            }

            saveBtn.addEventListener('click', saveName);
            nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveName(); });
            nameInput.focus();
        }

        // Initialize on page load
        askUserName();
    </script>
</body>
</html>
