<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DISHA // X-BIT PROTON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-base: #000000;
            --bg-card: #0a0a0a;
            --bg-glass: rgba(15, 15, 15, 0.85);
            --text-main: #ffffff;
            --text-dim: #88929a;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-accent: #ffffff;
            --shadow-soft: 0 12px 40px rgba(0, 0, 0, 0.6);
            --accent-dot: #ff0000;
            --font-sans: 'Plus Jakarta Sans', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        :root.light-theme {
            --bg-base: #f4f5f7;
            --bg-card: #ffffff;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --text-main: #000000;
            --text-dim: #6c737a;
            --border-subtle: rgba(0, 0, 0, 0.08);
            --border-accent: #000000;
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color var(--transition-smooth);
        }

        .phone-frame {
            width: 100%;
            max-width: 400px;
            height: 100%;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            padding-top: max(env(safe-area-inset-top, 20px), 20px); 
            transition: background-color var(--transition-smooth);
        }

        .top-nav {
            padding: calc(16px + env(safe-area-inset-top, 0px)) 20px 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .nav-square {
            width: 42px;
            height: 42px;
            background: var(--bg-card);
            border-radius: 14px;
            border: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s ease, background-color var(--transition-smooth);
        }

        .nav-square:active { transform: scale(0.95); }

        .app-brand {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.01em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .brand-dot {
            width: 5px;
            height: 5px;
            background-color: var(--accent-dot);
            border-radius: 50%;
        }

        .search-container {
            padding: 0 16px;
            margin-bottom: 12px;
            z-index: 10;
        }

        .premium-pill {
            background: var(--bg-card);
            border-radius: 28px;
            height: 54px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), background-color var(--transition-smooth), border-color var(--transition-smooth);
        }

        .premium-pill:active { transform: scale(0.98); }

        .premium-pill.pulse-shift {
            animation: shiftPulse 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes shiftPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.95); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .search-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 14px;
        }

        .search-right {
            font-size: 12px;
            color: var(--text-dim);
            padding-left: 14px;
        }

        .display-viewport {
            flex: 1;
            padding: 0 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .display-viewport::-webkit-scrollbar { display: none; }

        .empty-view {
            margin: auto;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 24px;
        }

        .empty-circle {
            width: 84px;
            height: 84px;
            background: var(--bg-card);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            border: 1px solid var(--border-subtle);
            transition: background-color var(--transition-smooth);
        }

        .empty-title {
            font-size: 19px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .empty-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            max-width: 280px;
            line-height: 1.5;
        }

        .msg-row {
            display: flex;
            width: 100%;
            margin-bottom: 4px;
        }
        
        .msg-row.user-align { justify-content: flex-end; }
        .msg-row.system-align { justify-content: flex-start; }

        /* Modified: Supports extension-injected structures alongside clean raw bubbles */
        .msg-capsule, .es-bubble-user, .es-bubble-sys {
            width: max-content;
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-subtle);
            transform: translateY(12px);
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), background-color var(--transition-smooth);
        }

        .msg-row.user-align .msg-capsule, .es-bubble-user {
            background: var(--text-main);
            color: var(--bg-base);
            border-bottom-right-radius: 4px;
            align-self: flex-end;
            margin-left: auto;
            margin-bottom: 8px;
        }

        .msg-row.system-align .msg-capsule, .es-bubble-sys {
            background: var(--bg-card);
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            margin-right: auto;
            margin-bottom: 8px;
        }

        .dock-anchor {
            padding: 8px 16px calc(34px + env(safe-area-inset-bottom, 16px)) 16px;
            z-index: 10;
            background: linear-gradient(to top, var(--bg-base) 60%, rgba(0,0,0,0));
        }

        .glass-dock {
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 10px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: background-color var(--transition-smooth), border-color var(--transition-smooth);
        }

        .glass-dock.highlight-focus {
            border-color: var(--text-main);
            box-shadow: 0 0 14px rgba(255, 255, 255, 0.15);
        }

        .input-row { padding: 4px 12px 0 12px; }

        .input-row input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font-sans);
            font-size: 15px;
            color: var(--text-main);
        }

        .input-row input::placeholder { color: var(--text-dim); opacity: 0.6; }

        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-left { display: flex; gap: 4px; }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            cursor: pointer;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .action-btn.pill-mode {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 0 10px;
            width: auto;
            min-width: 32px;
            height: 32px;
            font-size: 11px;
            font-weight: 500;
            display: flex;
            gap: 4px;
            border: 1px solid var(--border-subtle);
        }

        .action-btn.submit {
            background: var(--text-main);
            color: var(--bg-base);
            width: 40px;
            height: 40px;
        }

        .sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-slider {
            position: absolute;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--bg-card);
            border-right: 1px solid var(--border-subtle);
            z-index: 101;
            display: flex;
            flex-direction: column;
            padding: calc(24px + env(safe-area-inset-top, 24px)) 20px calc(24px + env(safe-area-inset-bottom, 24px)) 20px;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: var(--shadow-soft);
        }

        .sidebar-overlay.active .sidebar-slider { transform: translateX(280px); }

        .slider-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .slider-title { font-size: 15px; font-weight: 600; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }

        .slider-menu-list { display: flex; flex-direction: column; gap: 8px; flex: 1; }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .menu-item:hover, .menu-item.active { background-color: var(--bg-base); }

        .slider-footer {
            padding-top: 16px;
            border-top: 1px solid var(--border-subtle);
        }

        .toggle-pill {
            background: var(--bg-base);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .toggle-btn {
            flex: 1;
            border: none;
            background: transparent;
            height: 32px;
            font-family: var(--font-sans);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .toggle-btn.active { color: var(--text-main); }

        .pill-capsule {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(50% - 6px);
            height: 32px;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            z-index: 1;
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1);
        }

        :root.light-theme .pill-capsule { transform: translateX(100%); }

        .mic-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .mic-recording .mic-ring {
            opacity: 1;
            border-color: var(--accent-dot);
            animation: micPulse 1.2s ease-in-out infinite;
        }
        .mic-recording {
            background: rgba(255, 0, 0, 0.1) !important;
        }
        .mic-recording svg {
            stroke: var(--accent-dot) !important;
        }
        @keyframes micPulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.4); opacity: 0; }
            100% { transform: scale(1); opacity: 0.6; }
        }
        .mic-wave {
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .mic-recording .mic-wave {
            opacity: 1;
        }
        .mic-bar {
            width: 3px;
            height: 8px;
            background: var(--accent-dot);
            border-radius: 2px;
            animation: waveBar 0.6s ease-in-out infinite alternate;
        }
        .mic-bar:nth-child(2) { animation-delay: 0.1s; }
        .mic-bar:nth-child(3) { animation-delay: 0.2s; }
        .mic-bar:nth-child(4) { animation-delay: 0.3s; }
        @keyframes waveBar {
            0% { height: 4px; }
            100% { height: 12px; }
        }
        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            height: 20px;
        }
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: typingBounce 1.4s ease-in-out infinite both;
        }
        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>

        <script>
        // ====== CORE UTILITIES ======
        window.scrollEsToBottom = function() {
            const viewport = document.getElementById('es-messages');
            if (viewport) viewport.scrollTop = viewport.scrollHeight;
        };

        window.appendEsBubbleUser = function(query) {
            const emptyState = document.getElementById('emptyState');
            if (emptyState && emptyState.parentNode) emptyState.remove();
            const viewport = document.getElementById('es-messages');
            const row = document.createElement('div');
            row.className = 'msg-row user-align';
            const capsule = document.createElement('div');
            capsule.className = 'msg-capsule';
            capsule.textContent = query;
            row.appendChild(capsule);
            viewport.appendChild(row);
            setTimeout(() => { capsule.style.transform = 'translateY(0)'; }, 10);
            window.scrollEsToBottom();
        };

        // ====== SMART SEARCH ======
        window.doEsSearch = function(val) {
            const query = val.trim().toLowerCase();
            if (!query) return;
            window.appendEsBubbleUser(val);
            let response = '';
            if (query.includes('help')) {
                response = 'Here are some things you can ask me:<br><span style="font-size:0.75rem; color:var(--text-dim);">• <strong>weather</strong> — Get current weather info<br>• <strong>calc 2+2</strong> — Quick math<br>• <strong>time</strong> — Current time<br>• <strong>hello</strong> — Just say hi!</span>';
            } else if (query.includes('weather')) {
                response = '🌤️ Weather feature coming soon! For now, try asking about <strong>time</strong> or <strong>calc</strong>.';
            } else if (query.includes('calc') || query.includes('calculate') || /[0-9+\-*/().]/.test(query)) {
                try {
                    const expr = query.replace(/[^0-9+\-*/().]/g, '');
                    const result = eval(expr);
                    response = '🧮 <strong>' + expr + '</strong> = <strong>' + result + '</strong>';
                } catch(e) {
                    response = '❌ I could not calculate that. Try something like <strong>calc 2+2</strong>.';
                }
            } else if (query.includes('time') || query.includes('date')) {
                const now = new Date();
                response = '🕐 It is <strong>' + now.toLocaleTimeString() + '</strong> on <strong>' + now.toLocaleDateString() + '</strong>.';
            } else if (query.includes('hello') || query.includes('hi') || query.includes('hey')) {
                const name = localStorage.getItem('disha_username') || 'there';
                response = '👋 Hey <strong>' + name + '</strong>! How can I help you today?';
            } else if (query.includes('name')) {
                const name = localStorage.getItem('disha_username');
                response = name ? 'Your name is <strong>' + name + '</strong>.' : 'I do not know your name yet! It should have been asked when you first opened the app.';
            } else {
                response = 'I received: <strong>' + val + '</strong><br><span style="font-size:0.75rem; color:var(--text-dim);">Type <strong>help</strong> to see what I can do.</span>';
            }
            const viewport = document.getElementById('es-messages');
            const sysRow = document.createElement('div');
            sysRow.className = 'msg-row system-align';
            const sysCapsule = document.createElement('div');
            sysCapsule.className = 'msg-capsule';
            sysCapsule.innerHTML = '<span class="typing-dots"><span></span><span></span><span></span></span>';
            sysRow.appendChild(sysCapsule);
            viewport.appendChild(sysRow);
            setTimeout(() => { sysCapsule.style.transform = 'translateY(0)'; }, 10);
            window.scrollEsToBottom();
            setTimeout(() => {
                sysCapsule.innerHTML = response;
                window.scrollEsToBottom();
            }, 600 + Math.random() * 400);
            const inp = document.getElementById('es-input');
            if (inp) inp.value = '';
        };

        // ====== UI INTERACTIONS ======
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const openSidebar = document.getElementById('openSidebar');
        const closeSidebar = document.getElementById('closeSidebar');
        const dashboardSearchPill = document.getElementById('dashboardSearchPill');
        const inputDockContainer = document.getElementById('inputDockContainer');
        const rootElement = document.documentElement;

        openSidebar.addEventListener('click', () => sidebarOverlay.classList.add('active'));
        closeSidebar.addEventListener('click', () => sidebarOverlay.classList.remove('active'));
        sidebarOverlay.addEventListener('click', (e) => { if(e.target === sidebarOverlay) sidebarOverlay.classList.remove('active'); });

        dashboardSearchPill.addEventListener('click', () => {
            dashboardSearchPill.classList.add('pulse-shift');
            inputDockContainer.classList.add('highlight-focus');
            document.getElementById('es-input').focus();
            setTimeout(() => { dashboardSearchPill.classList.remove('pulse-shift'); }, 400);
            setTimeout(() => { inputDockContainer.classList.remove('highlight-focus'); }, 800);
        });

        const matrixField = document.getElementById('es-input');
        const sendStream = document.getElementById('es-send');

        function executeLocalPipeline() {
            const val = matrixField.value.trim();
            if (!val) return;
            window.doEsSearch(val);
        }

        sendStream.addEventListener('click', executeLocalPipeline);
        matrixField.addEventListener('keypress', (e) => { if (e.key === 'Enter') executeLocalPipeline(); });

        // ====== SPEECH TO TEXT ======
        const micBtn = document.getElementById('micBtn');
        const micInput = document.getElementById('es-input');
        let recognition = null;
        let silenceTimer = null;
        let isRecording = false;
        const SILENCE_DELAY = 2000;

        function isFileProtocol() {
            return window.location.protocol === 'file:';
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return null;
            const rec = new SpeechRecognition();
            rec.continuous = false;
            rec.interimResults = true;
            rec.lang = 'en-US';
            return rec;
        }

        function startRecording() {
            if (isFileProtocol()) {
                micInput.placeholder = 'Speech requires HTTPS server';
                const viewport = document.getElementById('es-messages');
                const emptyState = document.getElementById('emptyState');
                if (emptyState) emptyState.remove();
                const sysRow = document.createElement('div');
                sysRow.className = 'msg-row system-align';
                const sysCapsule = document.createElement('div');
                sysCapsule.className = 'msg-capsule';
                sysCapsule.innerHTML = '🔒 <strong>Speech Recognition needs HTTPS</strong><br><span style="font-size:0.75rem; color:var(--text-dim);">Open this page via a local server (e.g., <code>python -m http.server</code>) or deploy to a site with HTTPS. Browsers block mic access on file:// URLs.</span>';
                sysRow.appendChild(sysCapsule);
                viewport.appendChild(sysRow);
                setTimeout(() => { sysCapsule.style.transform = 'translateY(0)'; }, 10);
                window.scrollEsToBottom();
                setTimeout(() => { micInput.placeholder = 'Message Proton...'; }, 3000);
                return;
            }
            recognition = initSpeechRecognition();
            if (!recognition) {
                micInput.placeholder = 'Browser does not support speech';
                setTimeout(() => { micInput.placeholder = 'Message Proton...'; }, 3000);
                return;
            }
            isRecording = true;
            micBtn.classList.add('mic-recording');
            micInput.placeholder = 'Listening...';
            micInput.value = '';
            let finalTranscript = '';
            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                micInput.value = (finalTranscript + interimTranscript).trim();
                clearTimeout(silenceTimer);
                silenceTimer = setTimeout(() => {
                    if (isRecording && micInput.value.trim()) {
                        stopRecording();
                        executeLocalPipeline();
                    }
                }, SILENCE_DELAY);
            };
            recognition.onerror = (event) => {
                if (event.error === 'not-allowed') micInput.placeholder = 'Mic permission denied';
                else if (event.error === 'no-speech') micInput.placeholder = 'No speech detected';
                else micInput.placeholder = 'Speech error: ' + event.error;
                stopRecording();
            };
            recognition.onend = () => { stopRecording(); };
            try { recognition.start(); }
            catch(e) { micInput.placeholder = 'Could not start mic'; stopRecording(); }
        }

        function stopRecording() {
            isRecording = false;
            clearTimeout(silenceTimer);
            micBtn.classList.remove('mic-recording');
            micInput.placeholder = 'Message Proton...';
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
                try { recognition.abort(); } catch(e) {}
                recognition = null;
            }
        }

        micBtn.addEventListener('click', () => {
            if (isRecording) stopRecording();
            else startRecording();
        });

        // ====== USER NAME & GREETING ======
        function getTimeGreeting() {
            const hour = new Date().getHours();
            if (hour < 12) return 'good morning';
            if (hour < 17) return 'good afternoon';
            return 'good evening';
        }

        function updateGreeting(name) {
            const greetingEl = document.getElementById('greetingText');
            if (greetingEl && name) {
                greetingEl.textContent = 'Hey ' + name + ', ' + getTimeGreeting();
            }
        }

        function updateUserProfile(name) {
            const pfp = document.getElementById('userPfp');
            const nameDisplay = document.getElementById('userNameDisplay');
            if (pfp && name) pfp.textContent = name.charAt(0);
            if (nameDisplay && name) nameDisplay.textContent = name;
        }

        function askUserName() {
            const storedName = localStorage.getItem('disha_username');
            if (storedName) {
                updateGreeting(storedName);
                updateUserProfile(storedName);
                return;
            }
            const modal = document.createElement('div');
            modal.id = 'nameModal';
            modal.style.cssText = 'position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center;';
            modal.innerHTML = '<div style="background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 28px 24px; width: 320px; max-width: 90%; box-shadow: var(--shadow-soft); text-align: center;"><div style="margin-bottom: 12px; color: var(--text-main);"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg></div><h3 style="font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-main);">What is your name?</h3><p style="font-size: 13px; color: var(--text-dim); margin-bottom: 20px;">We will remember it for next time.</p><input type="text" id="nameInput" placeholder="Enter your name" style="width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid var(--border-subtle); background: var(--bg-base); color: var(--text-main); font-family: var(--font-sans); font-size: 15px; outline: none; margin-bottom: 16px;" autocomplete="off"><button id="saveNameBtn" style="width: 100%; padding: 12px; border-radius: 14px; border: none; background: var(--text-main); color: var(--bg-base); font-family: var(--font-sans); font-size: 15px; font-weight: 600; cursor: pointer;">Continue</button></div>';
            document.body.appendChild(modal);
            const nameInput = document.getElementById('nameInput');
            const saveBtn = document.getElementById('saveNameBtn');
            function saveName() {
                const name = nameInput.value.trim();
                if (name) {
                    localStorage.setItem('disha_username', name);
                    updateGreeting(name);
                    updateUserProfile(name);
                    modal.remove();
                } else {
                    nameInput.style.borderColor = 'var(--accent-dot)';
                    nameInput.focus();
                }
            }
            saveBtn.addEventListener('click', saveName);
            nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') saveName(); });
            nameInput.focus();
        }

        // ====== DARK MODE TOGGLE ======
        const darkModeToggle = document.getElementById('darkModeToggle');
        const darkModeSwitch = document.getElementById('darkModeSwitch');
        const darkModeKnob = document.getElementById('darkModeKnob');

        function setDarkMode(isOn) {
            if (isOn) {
                rootElement.classList.remove('light-theme');
                darkModeSwitch.style.background = 'var(--text-main)';
                darkModeKnob.style.transform = 'translateX(0)';
                darkModeKnob.style.right = '2px';
                darkModeKnob.style.left = 'auto';
            } else {
                rootElement.classList.add('light-theme');
                darkModeSwitch.style.background = 'var(--text-dim)';
                darkModeKnob.style.transform = 'translateX(-20px)';
            }
            localStorage.setItem('disha_darkmode', isOn ? 'on' : 'off');
        }

        const savedDarkMode = localStorage.getItem('disha_darkmode');
        if (savedDarkMode === 'off') setDarkMode(false);
        else setDarkMode(true);

        darkModeToggle.addEventListener('click', () => {
            const isCurrentlyDark = !rootElement.classList.contains('light-theme');
            setDarkMode(!isCurrentlyDark);
        });

        // Initialize on page load
        askUserName();
    </script>
</body>
</html>
